remote_theme: pages-themes/cayman@v0.2.0
plugins:
- jekyll-remote-theme # add this line to the plugins list if you already have one
title: うみちゃんの書き物置き場
description: 主にゲームや技術に関しての記事があると思います
url: https://umichang.github.io
baseurl: /blog
lang: ja-JP
markdown: kramdown
kramdown:
  input: GFM
  syntax_highlighter: rouge
  math_engine: mathjax
defaults:
- scope:
    path: ""
    type: pages
  values:
    layout: default
    image:
      path: /image/game-planner-blog-social-card.webp
      alt: ゲームの企画、プレイヤー体験、運営、データを結ぶ設計図

