{% assign cloudflare_web_analytics_token = site.analytics.cloudflare_web_analytics_token | default: "" %}
{% unless cloudflare_web_analytics_token == "" %}
<script defer src="https://static.cloudflareinsights.com/beacon.min.js" data-cf-beacon='{"token": "{{ cloudflare_web_analytics_token }}"}'></script>
{% endunless %}
