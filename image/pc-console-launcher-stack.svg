<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 680" role="img" aria-labelledby="title desc">
  <title id="title">PCのストア・ランチャー・DRMの重層構造</title>
  <desc id="desc">PCではゲームの下にストア、ランチャー、OS、周辺サービスが重なり、認証、更新、オーバーレイ、DRM、セーブ同期、フレンド機能などの処理が増える。</desc>
  <defs>
    <style>
      .bg{fill:#f7f8fb}
      .layer1{fill:#1f6feb}
      .layer2{fill:#4f8df6}
      .layer3{fill:#8ab4f8}
      .layer4{fill:#cfe0ff}
      .card{fill:#fff;stroke:#d9dfeb;stroke-width:2}
      .title{font:700 34px system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#1f2937}
      .label{font:700 23px system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#fff}
      .dark{font:700 22px system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#1f2937}
      .small{font:600 18px system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#374151}
    </style>
  </defs>
  <rect class="bg" width="1200" height="680"/>
  <text class="title" x="60" y="68">PCではゲーム体験の下に複数レイヤーが重なる</text>

  <g transform="translate(105 120)">
    <rect class="layer4" x="0" y="300" width="560" height="88" rx="8"/>
    <rect class="layer3" x="35" y="210" width="490" height="88" rx="8"/>
    <rect class="layer2" x="70" y="120" width="420" height="88" rx="8"/>
    <rect class="layer1" x="105" y="30" width="350" height="88" rx="8"/>
    <text class="label" x="280" y="82" text-anchor="middle">ゲーム</text>
    <text class="label" x="280" y="172" text-anchor="middle">ストア / ランチャー</text>
    <text class="dark" x="280" y="262" text-anchor="middle">OS / ドライバ</text>
    <text class="dark" x="280" y="352" text-anchor="middle">周辺サービス / 常駐アプリ</text>
  </g>

  <g transform="translate(720 120)">
    <rect class="card" x="0" y="0" width="360" height="76" rx="8"/>
    <text class="dark" x="35" y="32">起動時の認証</text>
    <text class="small" x="35" y="58">アカウント、DRM、権利確認</text>

    <rect class="card" x="0" y="92" width="360" height="76" rx="8"/>
    <text class="dark" x="35" y="124">自動更新</text>
    <text class="small" x="35" y="150">本体、ランチャー、DLCの更新</text>

    <rect class="card" x="0" y="184" width="360" height="76" rx="8"/>
    <text class="dark" x="35" y="216">オーバーレイ</text>
    <text class="small" x="35" y="242">通知、実績、配信、録画</text>

    <rect class="card" x="0" y="276" width="360" height="76" rx="8"/>
    <text class="dark" x="35" y="308">同期・ソーシャル</text>
    <text class="small" x="35" y="334">セーブ、フレンド、チャット</text>
  </g>

  <rect x="120" y="565" width="960" height="54" rx="8" fill="#fff8e6" stroke="#d6a84f" stroke-width="2"/>
  <text class="small" x="600" y="599" text-anchor="middle">便利さと引き換えに、起動経路と常駐処理が増えやすい</text>
</svg>
