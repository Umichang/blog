<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">PCゲームで発生しやすい追加コスト</title>
  <desc id="desc">PCゲームでは開発側にQA、設定メニュー、入力対応、ランチャー対応、クラッシュ解析、Steam Deck検証などが発生し、ユーザー側に本体価格、GPU更新、ドライバ管理、ストレージ増設、設定調整、トラブル対応などが発生する。</desc>
  <defs>
    <style>
      .bg{fill:#f6f8fb}
      .panel{fill:#fff;stroke:#d9dfeb;stroke-width:2}
      .dev{fill:#eaf2ff;stroke:#4f8df6;stroke-width:2}
      .user{fill:#fff3e8;stroke:#d88945;stroke-width:2}
      .title{font:700 34px system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#1f2937}
      .head{font:700 27px system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#1f2937}
      .label{font:700 19px system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#273244}
      .small{font:600 17px system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#475569}
      .center{fill:#1f2937}
      .centerText{font:700 25px system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#fff}
    </style>
  </defs>
  <rect class="bg" width="1200" height="720"/>
  <text class="title" x="60" y="68">PCゲームは「機材」と「検証」の両方にコストが乗る</text>

  <rect class="panel" x="70" y="115" width="480" height="500" rx="8"/>
  <text class="head" x="310" y="162" text-anchor="middle">開発側の追加コスト</text>
  <rect class="dev" x="125" y="205" width="160" height="68" rx="8"/>
  <text class="label" x="205" y="247" text-anchor="middle">多構成QA</text>
  <rect class="dev" x="335" y="205" width="160" height="68" rx="8"/>
  <text class="label" x="415" y="247" text-anchor="middle">設定メニュー</text>
  <rect class="dev" x="125" y="295" width="160" height="68" rx="8"/>
  <text class="label" x="205" y="337" text-anchor="middle">入力対応</text>
  <rect class="dev" x="335" y="295" width="160" height="68" rx="8"/>
  <text class="label" x="415" y="337" text-anchor="middle">画面比率対応</text>
  <rect class="dev" x="125" y="385" width="160" height="68" rx="8"/>
  <text class="label" x="205" y="427" text-anchor="middle">ランチャー対応</text>
  <rect class="dev" x="335" y="385" width="160" height="68" rx="8"/>
  <text class="label" x="415" y="427" text-anchor="middle">クラッシュ解析</text>
  <rect class="dev" x="125" y="475" width="370" height="68" rx="8"/>
  <text class="label" x="310" y="517" text-anchor="middle">アンチチート / Steam Deck検証</text>

  <rect class="panel" x="650" y="115" width="480" height="500" rx="8"/>
  <text class="head" x="890" y="162" text-anchor="middle">ユーザー側の追加コスト</text>
  <rect class="user" x="705" y="205" width="160" height="68" rx="8"/>
  <text class="label" x="785" y="247" text-anchor="middle">PC本体価格</text>
  <rect class="user" x="915" y="205" width="160" height="68" rx="8"/>
  <text class="label" x="995" y="247" text-anchor="middle">GPU更新</text>
  <rect class="user" x="705" y="295" width="160" height="68" rx="8"/>
  <text class="label" x="785" y="337" text-anchor="middle">ドライバ管理</text>
  <rect class="user" x="915" y="295" width="160" height="68" rx="8"/>
  <text class="label" x="995" y="337" text-anchor="middle">ストレージ増設</text>
  <rect class="user" x="705" y="385" width="160" height="68" rx="8"/>
  <text class="label" x="785" y="427" text-anchor="middle">設定調整</text>
  <rect class="user" x="915" y="385" width="160" height="68" rx="8"/>
  <text class="label" x="995" y="427" text-anchor="middle">周辺機器</text>
  <rect class="user" x="705" y="475" width="370" height="68" rx="8"/>
  <text class="label" x="890" y="517" text-anchor="middle">トラブルシューティング時間</text>

  <circle class="center" cx="600" cy="625" r="48"/>
  <text class="centerText" x="600" y="617" text-anchor="middle">知識と</text>
  <text class="centerText" x="600" y="648" text-anchor="middle">時間</text>
  <text class="small" x="600" y="690" text-anchor="middle">自由度が高いほど、調整と検証の責任も分散しやすい</text>
</svg>
