<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1180" viewBox="0 0 1200 1180" role="img" aria-labelledby="title desc">
  <title id="title">縦の遷移と横の遷移の違い</title>
  <desc id="desc">インタラクティブミュージックの基本技術である縦の遷移と横の遷移を比較する図。縦の遷移は同じ時間軸上で楽器レイヤーを足し引きし、横の遷移は曲の区間そのものを切り替える。</desc>
  <defs>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2563eb"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#15803d"/>
    </marker>
    <marker id="arrow-gray" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
    <style>
      text { font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", "Noto Sans JP", sans-serif; }
      .bg { fill: #f8fafc; }
      .title { fill: #111827; font-size: 32px; font-weight: 800; }
      .subtitle { fill: #475569; font-size: 16px; font-weight: 600; }
      .panel { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2; }
      .panel-title { fill: #0f172a; font-size: 25px; font-weight: 800; }
      .panel-sub { fill: #475569; font-size: 15px; font-weight: 600; }
      .axis { fill: #334155; font-size: 13px; font-weight: 800; }
      .track-label { fill: #0f172a; font-size: 17px; font-weight: 800; }
      .track-note { fill: #64748b; font-size: 13px; font-weight: 600; }
      .bar-label { fill: #475569; font-size: 12px; font-weight: 700; }
      .block-title { fill: #ffffff; font-size: 19px; font-weight: 800; }
      .block-note { fill: #eef2ff; font-size: 13px; font-weight: 700; }
      .callout-title { fill: #0f172a; font-size: 15px; font-weight: 800; }
      .callout-body { fill: #475569; font-size: 13px; font-weight: 600; }
      .small { fill: #64748b; font-size: 12px; font-weight: 600; }
      .badge { fill: #ffffff; font-size: 13px; font-weight: 800; }
      .summary-title { fill: #0f172a; font-size: 17px; font-weight: 800; }
      .summary-body { fill: #475569; font-size: 14px; font-weight: 600; }
      .grid { stroke: #e2e8f0; stroke-width: 1; }
    </style>
  </defs>

  <rect class="bg" width="1200" height="1180"/>
  <text x="60" y="54" class="title">縦の遷移と横の遷移</text>
  <text x="60" y="84" class="subtitle">縦は「同じ曲の上に音を足す」。横は「曲の次の区間へ進む」。</text>

  <!-- Vertical remixing -->
  <rect x="48" y="118" width="1104" height="420" rx="10" class="panel"/>
  <rect x="48" y="118" width="1104" height="70" rx="10" fill="#dbeafe"/>
  <rect x="48" y="160" width="1104" height="28" fill="#dbeafe"/>
  <text x="76" y="153" class="panel-title">縦の遷移（Vertical Remixing）</text>
  <text x="76" y="178" class="panel-sub">同じ時間軸の上で、楽器・密度・エフェクトを足し引きする</text>

  <text x="88" y="232" class="axis">楽器・レイヤー</text>
  <text x="646" y="232" class="axis">時間</text>
  <path d="M 260 240 L 1052 240" stroke="#64748b" stroke-width="2.4" fill="none" marker-end="url(#arrow-gray)"/>
  <path d="M 260 240 L 260 420" stroke="#64748b" stroke-width="2.4" fill="none"/>
  <line x1="420" y1="252" x2="420" y2="421" class="grid"/>
  <line x1="580" y1="252" x2="580" y2="421" class="grid"/>
  <line x1="740" y1="252" x2="740" y2="421" class="grid"/>
  <line x1="900" y1="252" x2="900" y2="421" class="grid"/>
  <text x="330" y="442" class="bar-label">1小節</text>
  <text x="490" y="442" class="bar-label">2小節</text>
  <text x="650" y="442" class="bar-label">3小節</text>
  <text x="810" y="442" class="bar-label">4小節</text>

  <text x="88" y="280" class="track-label">メロディ</text>
  <text x="88" y="302" class="track-note">緊張で追加</text>
  <rect x="264" y="260" width="756" height="34" rx="6" fill="#bfdbfe" stroke="#60a5fa"/>
  <rect x="720" y="260" width="300" height="34" rx="6" fill="#2563eb"/>
  <text x="870" y="282" text-anchor="middle" class="badge">ON</text>

  <text x="88" y="342" class="track-label">リズム</text>
  <text x="88" y="364" class="track-note">敵接近で追加</text>
  <rect x="264" y="322" width="756" height="34" rx="6" fill="#dcfce7" stroke="#86efac"/>
  <rect x="520" y="322" width="500" height="34" rx="6" fill="#16a34a"/>
  <text x="770" y="344" text-anchor="middle" class="badge">ON</text>

  <text x="88" y="404" class="track-label">土台</text>
  <text x="88" y="426" class="track-note">常に再生</text>
  <rect x="264" y="384" width="756" height="34" rx="6" fill="#f97316"/>
  <text x="642" y="406" text-anchor="middle" class="badge">LOOP</text>

  <path d="M 520 378 L 520 314" stroke="#15803d" stroke-width="2.6" stroke-dasharray="5 4" fill="none" marker-end="url(#arrow-green)"/>
  <rect x="456" y="456" width="128" height="30" rx="15" fill="#16a34a"/>
  <text x="520" y="476" text-anchor="middle" class="badge">探索 → 警戒</text>
  <path d="M 720 316 L 720 252" stroke="#2563eb" stroke-width="2.6" stroke-dasharray="5 4" fill="none" marker-end="url(#arrow-blue)"/>
  <rect x="656" y="456" width="128" height="30" rx="15" fill="#2563eb"/>
  <text x="720" y="476" text-anchor="middle" class="badge">警戒 → 戦闘</text>

  <rect x="76" y="494" width="210" height="30" rx="8" fill="#eff6ff" stroke="#bfdbfe"/>
  <text x="94" y="514" class="callout-title">得意：じわじわ密度を変える</text>
  <rect x="306" y="494" width="210" height="30" rx="8" fill="#f0fdf4" stroke="#bbf7d0"/>
  <text x="324" y="514" class="callout-title">反応：ほぼ即時に変化</text>
  <rect x="536" y="494" width="210" height="30" rx="8" fill="#fff7ed" stroke="#fed7aa"/>
  <text x="554" y="514" class="callout-title">苦手：テンポ・展開変更</text>

  <!-- Horizontal resequencing -->
  <rect x="48" y="568" width="1104" height="400" rx="10" class="panel"/>
  <rect x="48" y="568" width="1104" height="70" rx="10" fill="#dcfce7"/>
  <rect x="48" y="610" width="1104" height="28" fill="#dcfce7"/>
  <text x="76" y="603" class="panel-title">横の遷移（Horizontal Resequencing）</text>
  <text x="76" y="628" class="panel-sub">時間軸の上で、曲の区間そのものを切り替える</text>

  <text x="88" y="682" class="axis">曲の区間</text>
  <text x="646" y="682" class="axis">時間</text>
  <path d="M 260 692 L 1052 692" stroke="#64748b" stroke-width="2.4" fill="none" marker-end="url(#arrow-gray)"/>

  <rect x="272" y="730" width="170" height="74" rx="8" fill="#334155"/>
  <text x="357" y="761" text-anchor="middle" class="block-title">A区間</text>
  <text x="357" y="784" text-anchor="middle" class="block-note">探索ループ</text>
  <path d="M 458 767 C 496 722 560 722 598 767 C 560 812 496 812 458 767" stroke="#64748b" stroke-width="2" fill="none" marker-end="url(#arrow-gray)"/>
  <text x="528" y="721" text-anchor="middle" class="small">命令が来るまで</text>
  <text x="528" y="739" text-anchor="middle" class="small">同じ区間をループ</text>

  <line x1="666" y1="706" x2="666" y2="832" stroke="#15803d" stroke-width="2.6" stroke-dasharray="5 4"/>
  <path d="M 604 767 L 658 767" stroke="#15803d" stroke-width="3" fill="none" marker-end="url(#arrow-green)"/>
  <rect x="596" y="846" width="140" height="30" rx="15" fill="#16a34a"/>
  <text x="666" y="866" text-anchor="middle" class="badge">小節頭で遷移</text>

  <rect x="696" y="730" width="170" height="74" rx="8" fill="#16a34a"/>
  <text x="781" y="761" text-anchor="middle" class="block-title">B区間</text>
  <text x="781" y="784" text-anchor="middle" class="block-note">戦闘へ展開</text>
  <path d="M 872 767 L 922 767" stroke="#64748b" stroke-width="2" fill="none" marker-end="url(#arrow-gray)"/>
  <rect x="930" y="730" width="112" height="74" rx="8" fill="#f97316"/>
  <text x="986" y="761" text-anchor="middle" class="block-title">END</text>
  <text x="986" y="784" text-anchor="middle" class="block-note">終止</text>

  <rect x="270" y="900" width="130" height="36" rx="7" fill="#334155"/>
  <text x="335" y="924" text-anchor="middle" class="block-title">A</text>
  <rect x="418" y="900" width="130" height="36" rx="7" fill="#334155"/>
  <text x="483" y="924" text-anchor="middle" class="block-title">A'</text>
  <rect x="566" y="900" width="130" height="36" rx="7" fill="#16a34a"/>
  <text x="631" y="924" text-anchor="middle" class="block-title">B</text>
  <rect x="714" y="900" width="130" height="36" rx="7" fill="#f97316"/>
  <text x="779" y="924" text-anchor="middle" class="block-title">END</text>
  <path d="M 402 918 L 414 918" stroke="#64748b" stroke-width="2" fill="none" marker-end="url(#arrow-gray)"/>
  <path d="M 550 918 L 562 918" stroke="#15803d" stroke-width="2" fill="none" marker-end="url(#arrow-green)"/>
  <path d="M 698 918 L 710 918" stroke="#64748b" stroke-width="2" fill="none" marker-end="url(#arrow-gray)"/>

  <rect x="76" y="900" width="160" height="36" rx="8" fill="#f0fdf4" stroke="#bbf7d0"/>
  <text x="94" y="923" class="callout-title">劇的に展開を変える</text>
  <rect x="878" y="900" width="230" height="36" rx="8" fill="#fff7ed" stroke="#fed7aa"/>
  <text x="896" y="923" class="callout-title">注意：拍・小節待ちが発生</text>

  <!-- Summary -->
  <rect x="48" y="998" width="1104" height="118" rx="10" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
  <rect x="76" y="1026" width="498" height="62" rx="8" fill="#eff6ff" stroke="#bfdbfe"/>
  <text x="104" y="1054" class="summary-title">縦の遷移</text>
  <text x="222" y="1054" class="summary-body">音色・密度・エフェクトを変える</text>
  <text x="222" y="1078" class="summary-body">テンポや曲の流れは保ちやすい</text>
  <rect x="626" y="1026" width="498" height="62" rx="8" fill="#f0fdf4" stroke="#bbf7d0"/>
  <text x="654" y="1054" class="summary-title">横の遷移</text>
  <text x="772" y="1054" class="summary-body">メロディ・テンポ・構成まで変える</text>
  <text x="772" y="1078" class="summary-body">盛り上がりを作れるが設計コストは高い</text>
</svg>
