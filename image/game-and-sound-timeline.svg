<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="760" viewBox="0 0 1400 760" role="img" aria-labelledby="title desc">
  <title id="title">家庭用ゲーム機サウンド進化の要点</title>
  <desc id="desc">1983年のファミコンから2025年のNintendo Switch 2まで、家庭用ゲーム機サウンドの主要な進化を時系列で示した図。</desc>
  <defs>
    <style>
      .bg { fill: #f8fafc; }
      .axis { stroke: #334155; stroke-width: 4; stroke-linecap: round; }
      .tick { stroke: #64748b; stroke-width: 3; }
      .dot { fill: #0f766e; stroke: #ffffff; stroke-width: 4; }
      .card { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2; rx: 14; }
      .year { fill: #0f172a; font: 700 28px sans-serif; }
      .name { fill: #0f172a; font: 700 24px sans-serif; }
      .text { fill: #334155; font: 18px sans-serif; }
      .title { fill: #0f172a; font: 700 36px sans-serif; }
    </style>
  </defs>
  <rect class="bg" width="1400" height="760"/>
  <text class="title" x="700" y="58" text-anchor="middle">家庭用ゲーム機サウンド進化の要点</text>
  <line class="axis" x1="120" y1="370" x2="1280" y2="370"/>

  <g transform="translate(150 0)">
    <line class="tick" x1="0" y1="340" x2="0" y2="400"/>
    <circle class="dot" cx="0" cy="370" r="13"/>
    <rect class="card" x="-100" y="115" width="250" height="170"/>
    <text class="year" x="25" y="155" text-anchor="middle">1983</text>
    <text class="name" x="25" y="194" text-anchor="middle">ファミコン</text>
    <text class="text" x="25" y="232" text-anchor="middle">Ricoh 2A03 APU</text>
    <text class="text" x="25" y="262" text-anchor="middle">2 pulse + triangle</text>
    <text class="text" x="25" y="292" text-anchor="middle">+ noise + DMC</text>
  </g>

  <g transform="translate(335 0)">
    <line class="tick" x1="0" y1="340" x2="0" y2="400"/>
    <circle class="dot" cx="0" cy="370" r="13"/>
    <rect class="card" x="-125" y="455" width="250" height="150"/>
    <text class="year" x="0" y="495" text-anchor="middle">1986</text>
    <text class="name" x="0" y="534" text-anchor="middle">ディスクシステム</text>
    <text class="text" x="0" y="572" text-anchor="middle">追加音源の例外的導入</text>
    <text class="text" x="0" y="602" text-anchor="middle">1音増加と新音色</text>
  </g>

  <g transform="translate(520 0)">
    <line class="tick" x1="0" y1="340" x2="0" y2="400"/>
    <circle class="dot" cx="0" cy="370" r="13"/>
    <rect class="card" x="-125" y="115" width="250" height="170"/>
    <text class="year" x="0" y="155" text-anchor="middle">1990</text>
    <text class="name" x="0" y="194" text-anchor="middle">スーパーファミコン</text>
    <text class="text" x="0" y="232" text-anchor="middle">SPC700 / S-DSP</text>
    <text class="text" x="0" y="262" text-anchor="middle">8 voice BRR</text>
    <text class="text" x="0" y="292" text-anchor="middle">32kHz級, echo/FIR</text>
  </g>

  <g transform="translate(705 0)">
    <line class="tick" x1="0" y1="340" x2="0" y2="400"/>
    <circle class="dot" cx="0" cy="370" r="13"/>
    <rect class="card" x="-125" y="455" width="250" height="170"/>
    <text class="year" x="0" y="495" text-anchor="middle">1994</text>
    <text class="name" x="0" y="534" text-anchor="middle">PlayStation</text>
    <text class="text" x="0" y="572" text-anchor="middle">SPU 24 voice</text>
    <text class="text" x="0" y="602" text-anchor="middle">44.1kHz ADPCM</text>
    <text class="text" x="0" y="632" text-anchor="middle">CD-DA / XA streaming</text>
  </g>

  <g transform="translate(890 0)">
    <line class="tick" x1="0" y1="340" x2="0" y2="400"/>
    <circle class="dot" cx="0" cy="370" r="13"/>
    <rect class="card" x="-125" y="115" width="250" height="170"/>
    <text class="year" x="0" y="155" text-anchor="middle">1997</text>
    <text class="name" x="0" y="194" text-anchor="middle">PSY-Qワークフロー</text>
    <text class="text" x="0" y="232" text-anchor="middle">VAG / VAB / SEQ</text>
    <text class="text" x="0" y="262" text-anchor="middle">SPU RAM + streaming</text>
    <text class="text" x="0" y="292" text-anchor="middle">の分業</text>
  </g>

  <g transform="translate(1075 0)">
    <line class="tick" x1="0" y1="340" x2="0" y2="400"/>
    <circle class="dot" cx="0" cy="370" r="13"/>
    <rect class="card" x="-145" y="455" width="290" height="170"/>
    <text class="year" x="0" y="495" text-anchor="middle">2020</text>
    <text class="name" x="0" y="534" text-anchor="middle">PS5 / Xbox Series X|S</text>
    <text class="text" x="0" y="572" text-anchor="middle">Tempest 3D AudioTech</text>
    <text class="text" x="0" y="602" text-anchor="middle">Microsoft Spatial Sound</text>
    <text class="text" x="0" y="632" text-anchor="middle">+ hardware offload</text>
  </g>

  <g transform="translate(1250 0)">
    <line class="tick" x1="0" y1="340" x2="0" y2="400"/>
    <circle class="dot" cx="0" cy="370" r="13"/>
    <rect class="card" x="-130" y="115" width="260" height="170"/>
    <text class="year" x="0" y="155" text-anchor="middle">2025</text>
    <text class="name" x="0" y="194" text-anchor="middle">Nintendo Switch 2</text>
    <text class="text" x="0" y="232" text-anchor="middle">5.1 LPCM</text>
    <text class="text" x="0" y="262" text-anchor="middle">virtual surround</text>
    <text class="text" x="0" y="292" text-anchor="middle">立体サウンド + 音声処理</text>
  </g>
</svg>
