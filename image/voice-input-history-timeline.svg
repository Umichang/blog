<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080" role="img" aria-labelledby="title desc">
  <title id="title">家庭用ゲーム機 音声入力史タイムライン</title>
  <desc id="desc">1983年から2026年までを線形時間軸で示し、音圧検知、定型語彙の音声認識、汎用音声アシスタント、LLM自由対話の代表例を正確な年位置に配置した図。</desc>

  <defs>
    <linearGradient id="llm-bg" x1="0" x2="1">
      <stop offset="0" stop-color="#f5efff"/>
      <stop offset="1" stop-color="#fbf9ff"/>
    </linearGradient>
    <linearGradient id="assistant-bg" x1="0" x2="1">
      <stop offset="0" stop-color="#fff3e8"/>
      <stop offset="1" stop-color="#fffaf5"/>
    </linearGradient>
    <linearGradient id="fixed-bg" x1="0" x2="1">
      <stop offset="0" stop-color="#edf5ff"/>
      <stop offset="1" stop-color="#f8fbff"/>
    </linearGradient>
    <linearGradient id="pressure-bg" x1="0" x2="1">
      <stop offset="0" stop-color="#f1f1f1"/>
      <stop offset="1" stop-color="#fafafa"/>
    </linearGradient>

    <marker id="arrow-purple" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0 0L10 5L0 10Z" fill="#8b3fd1"/>
    </marker>
    <marker id="arrow-orange" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0 0L10 5L0 10Z" fill="#f97316"/>
    </marker>
    <marker id="arrow-blue" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0 0L10 5L0 10Z" fill="#2563eb"/>
    </marker>
    <marker id="arrow-gray" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0 0L10 5L0 10Z" fill="#6b7280"/>
    </marker>

    <filter id="card-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#111827" flood-opacity="0.12"/>
    </filter>
  </defs>

  <style>
    text { font-family: "Hiragino Sans", "Yu Gothic", "Noto Sans CJK JP", sans-serif; fill: #111827; }
    .title { font-size: 48px; font-weight: 800; letter-spacing: 0.02em; }
    .axis-label { font-size: 20px; font-weight: 700; fill: #374151; }
    .lane-label { font-size: 28px; font-weight: 800; }
    .lane-sub { font-size: 15px; font-weight: 600; fill: #6b7280; }
    .guide { stroke: #9ca3af; stroke-width: 1.5; stroke-dasharray: 5 7; opacity: 0.48; }
    .event-guide { stroke: #6b7280; stroke-width: 1.5; stroke-dasharray: 4 6; opacity: 0.52; }
    .leader { fill: none; stroke: #6b7280; stroke-width: 2; }
    .card-year { font-size: 16px; font-weight: 800; fill: #4b5563; }
    .card-main { font-size: 18px; font-weight: 750; }
    .card-small { font-size: 15px; font-weight: 700; }
    .note { font-size: 15px; font-weight: 600; fill: #6b7280; }
    .dot { stroke: #fff; stroke-width: 4; }
  </style>

  <rect width="1920" height="1080" fill="#fff"/>
  <text x="960" y="72" text-anchor="middle" class="title">家庭用ゲーム機 音声入力史タイムライン</text>
  <text x="960" y="105" text-anchor="middle" class="note">1983–2026｜横位置は線形時間軸に基づく</text>

  <!-- Linear time axis: x = 300 + (year - 1983) / 43 * 1520 -->
  <line x1="300" y1="175" x2="1820" y2="175" stroke="#111827" stroke-width="3"/>
  <path d="M1820 165L1840 175L1820 185Z" fill="#111827"/>

  <!-- Major ticks and labels -->
  <g>
    <line x1="300" y1="163" x2="300" y2="187" stroke="#111827" stroke-width="3"/>
    <text x="300" y="148" text-anchor="middle" class="axis-label">1983</text>
    <line x1="370.70" y1="163" x2="370.70" y2="187" stroke="#111827" stroke-width="3"/>
    <text x="370.70" y="148" text-anchor="middle" class="axis-label">1985</text>
    <line x1="547.44" y1="163" x2="547.44" y2="187" stroke="#111827" stroke-width="3"/>
    <text x="547.44" y="148" text-anchor="middle" class="axis-label">1990</text>
    <line x1="724.19" y1="163" x2="724.19" y2="187" stroke="#111827" stroke-width="3"/>
    <text x="724.19" y="148" text-anchor="middle" class="axis-label">1995</text>
    <line x1="900.93" y1="163" x2="900.93" y2="187" stroke="#111827" stroke-width="3"/>
    <text x="900.93" y="148" text-anchor="middle" class="axis-label">2000</text>
    <line x1="1077.67" y1="163" x2="1077.67" y2="187" stroke="#111827" stroke-width="3"/>
    <text x="1077.67" y="148" text-anchor="middle" class="axis-label">2005</text>
    <line x1="1254.42" y1="163" x2="1254.42" y2="187" stroke="#111827" stroke-width="3"/>
    <text x="1254.42" y="148" text-anchor="middle" class="axis-label">2010</text>
    <line x1="1431.16" y1="163" x2="1431.16" y2="187" stroke="#111827" stroke-width="3"/>
    <text x="1431.16" y="148" text-anchor="middle" class="axis-label">2015</text>
    <line x1="1607.91" y1="163" x2="1607.91" y2="187" stroke="#111827" stroke-width="3"/>
    <text x="1607.91" y="148" text-anchor="middle" class="axis-label">2020</text>
    <line x1="1784.65" y1="163" x2="1784.65" y2="187" stroke="#111827" stroke-width="3"/>
    <text x="1776" y="132" text-anchor="end" class="axis-label">2025</text>
    <line x1="1820" y1="163" x2="1820" y2="187" stroke="#111827" stroke-width="3"/>
    <text x="1820" y="158" text-anchor="end" class="axis-label">2026</text>
  </g>

  <!-- Lane backgrounds -->
  <rect x="32" y="220" width="1818" height="165" rx="18" fill="url(#llm-bg)"/>
  <rect x="32" y="410" width="1818" height="165" rx="18" fill="url(#assistant-bg)"/>
  <rect x="32" y="600" width="1818" height="190" rx="18" fill="url(#fixed-bg)"/>
  <rect x="32" y="815" width="1818" height="205" rx="18" fill="url(#pressure-bg)"/>

  <!-- Major gridlines -->
  <g>
    <line x1="300" y1="188" x2="300" y2="1020" class="guide"/>
    <line x1="370.70" y1="188" x2="370.70" y2="1020" class="guide"/>
    <line x1="547.44" y1="188" x2="547.44" y2="1020" class="guide"/>
    <line x1="724.19" y1="188" x2="724.19" y2="1020" class="guide"/>
    <line x1="900.93" y1="188" x2="900.93" y2="1020" class="guide"/>
    <line x1="1077.67" y1="188" x2="1077.67" y2="1020" class="guide"/>
    <line x1="1254.42" y1="188" x2="1254.42" y2="1020" class="guide"/>
    <line x1="1431.16" y1="188" x2="1431.16" y2="1020" class="guide"/>
    <line x1="1607.91" y1="188" x2="1607.91" y2="1020" class="guide"/>
    <line x1="1784.65" y1="188" x2="1784.65" y2="1020" class="guide"/>
    <line x1="1820" y1="188" x2="1820" y2="1020" class="guide"/>
  </g>

  <!-- Additional event-year guides -->
  <g>
    <line x1="406.05" y1="188" x2="406.05" y2="950" class="event-guide"/>
    <line x1="830.23" y1="188" x2="830.23" y2="730" class="event-guide"/>
    <line x1="865.58" y1="188" x2="865.58" y2="730" class="event-guide"/>
    <line x1="1006.98" y1="188" x2="1006.98" y2="730" class="event-guide"/>
    <line x1="1360.47" y1="188" x2="1360.47" y2="540" class="event-guide"/>
    <line x1="1713.95" y1="188" x2="1713.95" y2="540" class="event-guide"/>
  </g>

  <!-- Lane labels -->
  <g>
    <rect x="32" y="220" width="235" height="165" rx="18" fill="#eee2ff"/>
    <rect x="32" y="220" width="12" height="165" rx="6" fill="#8b3fd1"/>
    <text x="62" y="288" class="lane-label">LLM自由対話</text>
    <text x="62" y="321" class="lane-sub">文脈理解＋応答生成</text>

    <rect x="32" y="410" width="235" height="165" rx="18" fill="#ffead8"/>
    <rect x="32" y="410" width="12" height="165" rx="6" fill="#f97316"/>
    <text x="62" y="478" class="lane-label">汎用音声</text>
    <text x="62" y="512" class="lane-label">アシスタント</text>

    <rect x="32" y="600" width="235" height="190" rx="18" fill="#dfedff"/>
    <rect x="32" y="600" width="12" height="190" rx="6" fill="#2563eb"/>
    <text x="62" y="672" class="lane-label">定型語彙の</text>
    <text x="62" y="706" class="lane-label">音声認識</text>

    <rect x="32" y="815" width="235" height="205" rx="18" fill="#e7e7e7"/>
    <rect x="32" y="815" width="12" height="205" rx="6" fill="#6b7280"/>
    <text x="62" y="912" class="lane-label">音圧検知</text>
    <text x="62" y="945" class="lane-sub">1ビット on / off</text>
  </g>

  <!-- Lane timelines -->
  <line x1="300" y1="350" x2="1818" y2="350" stroke="#8b3fd1" stroke-width="6" marker-end="url(#arrow-purple)"/>
  <line x1="300" y1="540" x2="1818" y2="540" stroke="#f97316" stroke-width="6" marker-end="url(#arrow-orange)"/>
  <line x1="300" y1="730" x2="1818" y2="730" stroke="#2563eb" stroke-width="6" marker-end="url(#arrow-blue)"/>
  <line x1="300" y1="950" x2="1818" y2="950" stroke="#6b7280" stroke-width="6" marker-end="url(#arrow-gray)"/>

  <!-- LLM events: 2023 shares one exact x-coordinate -->
  <g>
    <rect x="1560" y="242" width="300" height="78" rx="12" fill="#fff" stroke="#c9a8ec" stroke-width="2" filter="url(#card-shadow)"/>
    <text x="1710" y="263" text-anchor="middle" class="card-year">2023</text>
    <text x="1710" y="286" text-anchor="middle" class="card-main">NVIDIA ACE</text>
    <text x="1710" y="307" text-anchor="middle" class="card-small">AI対話ゲーム群</text>
    <line x1="1713.95" y1="320" x2="1713.95" y2="338" class="leader"/>
    <circle cx="1713.95" cy="350" r="12" fill="#8b3fd1" class="dot"/>
  </g>

  <!-- Assistant events -->
  <g>
    <rect x="1095" y="438" width="215" height="65" rx="11" fill="#fff" stroke="#fdba74" stroke-width="2" filter="url(#card-shadow)"/>
    <text x="1202.5" y="460" text-anchor="middle" class="card-year">2010</text>
    <text x="1202.5" y="486" text-anchor="middle" class="card-main">Xbox 360 Kinect</text>
    <path d="M1202.5 503L1202.5 516L1254.42 516L1254.42 528" class="leader"/>
    <circle cx="1254.42" cy="540" r="12" fill="#f97316" class="dot"/>

    <rect x="1322" y="456" width="220" height="65" rx="11" fill="#fff" stroke="#fdba74" stroke-width="2" filter="url(#card-shadow)"/>
    <text x="1432" y="478" text-anchor="middle" class="card-year">2013</text>
    <text x="1432" y="504" text-anchor="middle" class="card-main">Xbox One Kinect</text>
    <path d="M1432 521L1432 528L1360.47 528L1360.47 540" class="leader"/>
    <circle cx="1360.47" cy="540" r="12" fill="#f97316" class="dot"/>

    <rect x="1588" y="438" width="245" height="65" rx="11" fill="#fff" stroke="#fdba74" stroke-width="2" filter="url(#card-shadow)"/>
    <text x="1710.5" y="460" text-anchor="middle" class="card-year">2023</text>
    <text x="1710.5" y="486" text-anchor="middle" class="card-main">Hey PlayStation</text>
    <line x1="1713.95" y1="503" x2="1713.95" y2="528" class="leader"/>
    <circle cx="1713.95" cy="540" r="12" fill="#f97316" class="dot"/>
  </g>

  <!-- Fixed-vocabulary events; same-year titles share one dot -->
  <g>
    <rect x="650" y="618" width="174" height="65" rx="11" fill="#fff" stroke="#93c5fd" stroke-width="2" filter="url(#card-shadow)"/>
    <text x="737" y="640" text-anchor="middle" class="card-year">1998</text>
    <text x="737" y="666" text-anchor="middle" class="card-main">NINTENDO 64 VRS</text>
    <path d="M824 666L830.23 666L830.23 718" class="leader"/>
    <circle cx="830.23" cy="730" r="12" fill="#2563eb" class="dot"/>

    <rect x="840" y="635" width="135" height="65" rx="11" fill="#fff" stroke="#93c5fd" stroke-width="2" filter="url(#card-shadow)"/>
    <text x="907.5" y="657" text-anchor="middle" class="card-year">1999</text>
    <text x="907.5" y="683" text-anchor="middle" class="card-main">シーマン</text>
    <path d="M865.58 700L865.58 718" class="leader"/>
    <circle cx="865.58" cy="730" r="12" fill="#2563eb" class="dot"/>

    <rect x="985" y="616" width="225" height="86" rx="11" fill="#fff" stroke="#93c5fd" stroke-width="2" filter="url(#card-shadow)"/>
    <text x="1097.5" y="638" text-anchor="middle" class="card-year">2003</text>
    <text x="1097.5" y="664" text-anchor="middle" class="card-main">オペレーターズサイド</text>
    <text x="1097.5" y="687" text-anchor="middle" class="card-main">SOCOM</text>
    <path d="M1006.98 702L1006.98 718" class="leader"/>
    <circle cx="1006.98" cy="730" r="12" fill="#2563eb" class="dot"/>

    <rect x="1225" y="632" width="170" height="86" rx="11" fill="#fff" stroke="#93c5fd" stroke-width="2" filter="url(#card-shadow)"/>
    <text x="1310" y="654" text-anchor="middle" class="card-year">2005</text>
    <text x="1310" y="680" text-anchor="middle" class="card-main">脳トレ</text>
    <text x="1310" y="703" text-anchor="middle" class="card-main">逆転裁判</text>
    <path d="M1225 702L1077.67 702L1077.67 718" class="leader"/>
    <circle cx="1077.67" cy="730" r="12" fill="#2563eb" class="dot"/>
  </g>

  <!-- Sound-pressure events -->
  <g>
    <rect x="310" y="836" width="205" height="65" rx="11" fill="#fff" stroke="#c4c4c4" stroke-width="2" filter="url(#card-shadow)"/>
    <text x="412.5" y="858" text-anchor="middle" class="card-year">1983</text>
    <text x="412.5" y="884" text-anchor="middle" class="card-main">ファミコン2Pマイク</text>
    <path d="M310 884L300 884L300 938" class="leader"/>
    <circle cx="300" cy="950" r="12" fill="#6b7280" class="dot"/>

    <rect x="530" y="864" width="185" height="65" rx="11" fill="#fff" stroke="#c4c4c4" stroke-width="2" filter="url(#card-shadow)"/>
    <text x="622.5" y="886" text-anchor="middle" class="card-year">1985</text>
    <text x="622.5" y="912" text-anchor="middle" class="card-main">バンゲリングベイ</text>
    <path d="M530 912L370.70 912L370.70 938" class="leader"/>
    <circle cx="370.70" cy="950" r="12" fill="#6b7280" class="dot"/>

    <rect x="730" y="892" width="170" height="65" rx="11" fill="#fff" stroke="#c4c4c4" stroke-width="2" filter="url(#card-shadow)"/>
    <text x="815" y="914" text-anchor="middle" class="card-year">1986</text>
    <text x="815" y="940" text-anchor="middle" class="card-main">ゼルダの伝説</text>
    <path d="M730 940L406.05 940L406.05 950" class="leader"/>
    <circle cx="406.05" cy="950" r="12" fill="#6b7280" class="dot"/>
  </g>

  <text x="1835" y="1054" text-anchor="end" class="note">同一年の項目は同一のX座標に集約</text>
</svg>
