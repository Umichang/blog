<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" role="img" aria-labelledby="title desc">
  <title id="title">PCゲームのユーザー環境差</title>
  <desc id="desc">PC版ではハイエンドGPU、内蔵GPU、古いノートPC、Steam Deck、Windows、SteamOS、ウルトラワイド、マウスキーボード、DualSenseなど多様な環境を想定する必要がある。</desc>
  <defs>
    <style>
      .bg{fill:#f6f8fb}
      .center{fill:#1f2937}
      .node{fill:#fff;stroke:#9fb2d0;stroke-width:2}
      .node2{fill:#eef6ff;stroke:#5a91d9;stroke-width:2}
      .title{font:700 34px system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#1f2937}
      .centerText{font:700 27px system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#fff}
      .label{font:700 20px system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#1f2937}
      .small{font:600 17px system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#475569}
      .line{stroke:#8aa1c5;stroke-width:3}
    </style>
  </defs>
  <rect class="bg" width="1200" height="700"/>
  <text class="title" x="60" y="68">PC版は「同じゲーム」でも環境が大きく違う</text>

  <circle class="center" cx="600" cy="360" r="105"/>
  <text class="centerText" x="600" y="345" text-anchor="middle">PC版の</text>
  <text class="centerText" x="600" y="381" text-anchor="middle">設計対象</text>

  <line class="line" x1="520" y1="300" x2="315" y2="165"/>
  <line class="line" x1="600" y1="255" x2="600" y2="140"/>
  <line class="line" x1="680" y1="300" x2="885" y2="165"/>
  <line class="line" x1="495" y1="360" x2="265" y2="360"/>
  <line class="line" x1="705" y1="360" x2="935" y2="360"/>
  <line class="line" x1="520" y1="420" x2="315" y2="555"/>
  <line class="line" x1="600" y1="465" x2="600" y2="580"/>
  <line class="line" x1="680" y1="420" x2="885" y2="555"/>

  <rect class="node2" x="160" y="120" width="260" height="70" rx="8"/>
  <text class="label" x="290" y="163" text-anchor="middle">RTX 4090級</text>
  <rect class="node" x="470" y="100" width="260" height="70" rx="8"/>
  <text class="label" x="600" y="143" text-anchor="middle">内蔵GPU</text>
  <rect class="node2" x="780" y="120" width="260" height="70" rx="8"/>
  <text class="label" x="910" y="163" text-anchor="middle">古いノートPC</text>

  <rect class="node" x="110" y="325" width="260" height="70" rx="8"/>
  <text class="label" x="240" y="368" text-anchor="middle">Steam Deck</text>
  <rect class="node" x="830" y="325" width="260" height="70" rx="8"/>
  <text class="label" x="960" y="368" text-anchor="middle">Windows / SteamOS</text>

  <rect class="node2" x="160" y="530" width="260" height="70" rx="8"/>
  <text class="label" x="290" y="573" text-anchor="middle">ウルトラワイド</text>
  <rect class="node" x="470" y="550" width="260" height="70" rx="8"/>
  <text class="label" x="600" y="593" text-anchor="middle">マウス＋キーボード</text>
  <rect class="node2" x="780" y="530" width="260" height="70" rx="8"/>
  <text class="label" x="910" y="573" text-anchor="middle">DualSense</text>

  <text class="small" x="600" y="660" text-anchor="middle">仕様設計では、性能差だけでなく入力、画面、OS、互換性の差も吸収する必要がある</text>
</svg>
