<svg xmlns="http://www.w3.org/2000/svg" width="1536" height="1024" viewBox="0 0 1536 1024" role="img" aria-labelledby="title desc">
  <title id="title">日本著作権法におけるMod関連権利マップ</title>
  <desc id="desc">著作財産権と著作者人格権の違い、私的複製の例外、Modが侵害しうる権利を整理した図</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f8fbff"/>
      <stop offset="1" stop-color="#eef3f8"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="5" stdDeviation="7" flood-color="#0f2740" flood-opacity="0.12"/>
    </filter>
    <style>
      text { font-family: "Hiragino Sans", "Noto Sans CJK JP", sans-serif; fill: #17263a; }
      .title { font-size: 60px; font-weight: 800; fill: #fff; }
      .head { font-size: 46px; font-weight: 800; fill: #fff; }
      .subhead { font-size: 30px; font-weight: 800; }
      .body { font-size: 25px; font-weight: 600; }
      .small { font-size: 21px; font-weight: 600; }
      .note { font-size: 25px; font-weight: 800; }
      .center { text-anchor: middle; }
    </style>
  </defs>

  <rect width="1536" height="1024" fill="url(#bg)"/>
  <rect x="492" y="24" width="552" height="92" rx="20" fill="#102f59" filter="url(#shadow)"/>
  <text x="768" y="88" class="title center" fill="#fff">日本著作権法</text>
  <path d="M768 116 V150 H386 V176 M768 150 H1150 V176" fill="none" stroke="#52697f" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>

  <g filter="url(#shadow)">
    <rect x="56" y="176" width="660" height="516" rx="22" fill="#fff" stroke="#1468b8" stroke-width="4"/>
    <rect x="56" y="176" width="660" height="88" rx="20" fill="#1468b8"/>
    <rect x="820" y="176" width="660" height="516" rx="22" fill="#fff" stroke="#633da0" stroke-width="4"/>
    <rect x="820" y="176" width="660" height="88" rx="20" fill="#633da0"/>
  </g>

  <text x="386" y="236" class="head center">著作財産権</text>
  <text x="1150" y="236" class="head center">著作者人格権</text>

  <rect x="84" y="288" width="604" height="82" rx="14" fill="#eaf4ff"/>
  <text x="110" y="322" class="subhead">譲渡・相続 可</text>
  <text x="110" y="354" class="small">パブリッシャー保有可</text>
  <rect x="848" y="288" width="604" height="82" rx="14" fill="#f2edfb"/>
  <text x="874" y="322" class="subhead">譲渡・相続 不可</text>
  <text x="874" y="354" class="small">制作者個人に一身専属</text>

  <text x="84" y="414" class="subhead" fill="#1468b8">代表的な権利</text>
  <text x="110" y="456" class="body">複製権（21条）</text>
  <text x="110" y="494" class="body">翻案権（27条）</text>
  <text x="110" y="532" class="body">二次的著作物の利用権（28条）</text>
  <text x="848" y="414" class="subhead" fill="#633da0">代表的な権利</text>
  <text x="874" y="456" class="body">公表権（18条）</text>
  <text x="874" y="494" class="body">氏名表示権（19条）</text>
  <text x="874" y="532" class="body">同一性保持権（20条）</text>

  <rect x="84" y="572" width="604" height="92" rx="14" fill="#dceeff" stroke="#1468b8" stroke-width="2"/>
  <text x="110" y="610" class="subhead">私的複製の例外（30条）</text>
  <text x="110" y="646" class="body" fill="#1468b8">財産権側に適用</text>
  <rect x="848" y="572" width="604" height="92" rx="14" fill="#eee5fa" stroke="#633da0" stroke-width="2"/>
  <text x="874" y="610" class="subhead">私的複製の例外</text>
  <text x="874" y="646" class="body" fill="#633da0">適用されない</text>

  <rect x="56" y="724" width="1424" height="70" rx="16" fill="#102f59"/>
  <text x="768" y="772" class="head center" font-size="38">Modが侵害しうる権利</text>

  <g filter="url(#shadow)">
    <rect x="56" y="814" width="452" height="90" rx="16" fill="#eef6ff" stroke="#1468b8" stroke-width="3"/>
    <rect x="542" y="814" width="452" height="90" rx="16" fill="#effaf4" stroke="#25845a" stroke-width="3"/>
    <rect x="1028" y="814" width="452" height="90" rx="16" fill="#fff5e9" stroke="#c86a13" stroke-width="3"/>
  </g>
  <text x="282" y="850" class="small center">世界設定の改変</text>
  <text x="282" y="884" class="note center" fill="#1468b8">→ 同一性保持権</text>
  <text x="768" y="850" class="small center">既存素材の利用</text>
  <text x="768" y="884" class="note center" fill="#25845a">→ 翻案権</text>
  <text x="1254" y="850" class="small center">Modの譲渡・販売</text>
  <text x="1254" y="884" class="note center" fill="#c86a13">→ 二次的著作物の利用権</text>

  <rect x="56" y="928" width="1424" height="68" rx="16" fill="#fff1d6" stroke="#b86b00" stroke-width="3"/>
  <circle cx="100" cy="962" r="23" fill="#d97a00"/>
  <text x="100" y="972" class="subhead center" fill="#fff">!</text>
  <text x="768" y="971" class="note center">私的複製は財産権側の免責のみ。人格権侵害には及ばない</text>
</svg>
