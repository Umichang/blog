<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760" role="img" aria-labelledby="title desc">
  <title id="title">目的別プラットフォーム配置マップ</title>
  <desc id="desc">ゲームコミュニティ運営で使うプラットフォームを、新規認知と既存ファンとの関係、短く届く情報と深く残る情報の二軸で分類した図。</desc>
  <defs>
    <style>
      text {
        font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", "Noto Sans JP", sans-serif;
        fill: #172033;
      }
      .title { font-size: 34px; font-weight: 800; }
      .subtitle { font-size: 17px; fill: #5c667a; }
      .axis-title { font-size: 19px; font-weight: 800; fill: #263047; }
      .axis-note { font-size: 14px; fill: #69758c; }
      .quadrant { font-size: 17px; font-weight: 800; fill: #48546a; }
      .bubble-title { font-size: 20px; font-weight: 800; fill: #111827; }
      .bubble-note { font-size: 13px; fill: #4b5563; }
      .legend { font-size: 14px; fill: #5c667a; }
      .small { font-size: 12px; fill: #6b7280; }
    </style>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#64748b" flood-opacity="0.16"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#4b5563"/>
    </marker>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#eef2f7"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="1280" height="760" fill="#f6f7fb"/>
  <rect x="38" y="32" width="1204" height="696" rx="28" fill="url(#panel)" stroke="#d7dde8"/>

  <text x="88" y="84" class="title">目的別プラットフォーム配置マップ</text>
  <text x="88" y="116" class="subtitle">最初に「どこで何を届けるか」を決める。単一SNSで完結させず、役割を分けて組み合わせる。</text>

  <g transform="translate(104 150)">
    <rect x="0" y="0" width="1072" height="500" rx="22" fill="#ffffff" stroke="#d7dde8" filter="url(#shadow)"/>

    <rect x="38" y="40" width="498" height="205" rx="18" fill="#ecfeff" stroke="#c4eef3"/>
    <rect x="536" y="40" width="498" height="205" rx="18" fill="#f0f9ff" stroke="#c8e3f4"/>
    <rect x="38" y="245" width="498" height="205" rx="18" fill="#f7f7ff" stroke="#d9d8ff"/>
    <rect x="536" y="245" width="498" height="205" rx="18" fill="#f6f9ed" stroke="#dce8bd"/>

    <text x="62" y="74" class="quadrant">見つけてもらう</text>
    <text x="560" y="74" class="quadrant">理解してもらう</text>
    <text x="62" y="279" class="quadrant">話し続けてもらう</text>
    <text x="560" y="279" class="quadrant">あとから参照してもらう</text>

    <line x1="92" y1="478" x2="980" y2="478" stroke="#4b5563" stroke-width="3" marker-end="url(#arrow)"/>
    <line x1="62" y1="416" x2="62" y2="62" stroke="#4b5563" stroke-width="3" marker-end="url(#arrow)"/>
    <text x="320" y="492" text-anchor="middle" class="axis-note">短く届く情報（浅い接触）</text>
    <text x="824" y="492" text-anchor="middle" class="axis-title">深く残る情報（理解・保存）</text>
    <text x="82" y="31" class="axis-title">新規認知を広げる</text>
    <text x="82" y="443" class="axis-note">既存ファンとの関係を育てる</text>

    <g filter="url(#shadow)">
      <rect x="145" y="104" width="152" height="72" rx="16" fill="#19c7d4"/>
      <text x="221" y="133" text-anchor="middle" class="bubble-title">TikTok</text>
      <text x="221" y="156" text-anchor="middle" class="bubble-note">発見・短尺拡散</text>

      <rect x="312" y="132" width="134" height="70" rx="16" fill="#d8e4ef"/>
      <text x="379" y="160" text-anchor="middle" class="bubble-title">X</text>
      <text x="379" y="183" text-anchor="middle" class="bubble-note">速報・傾聴</text>

      <rect x="512" y="108" width="172" height="72" rx="16" fill="#f3b64e"/>
      <text x="598" y="137" text-anchor="middle" class="bubble-title">Instagram</text>
      <text x="598" y="160" text-anchor="middle" class="bubble-note">ビジュアル信頼</text>

      <rect x="752" y="110" width="150" height="72" rx="16" fill="#ef5b5b"/>
      <text x="827" y="139" text-anchor="middle" class="bubble-title">YouTube</text>
      <text x="827" y="162" text-anchor="middle" class="bubble-note">長尺・検索流入</text>

      <rect x="744" y="305" width="180" height="72" rx="16" fill="#7ec46d"/>
      <text x="834" y="334" text-anchor="middle" class="bubble-title">フォーラム / Wiki</text>
      <text x="834" y="357" text-anchor="middle" class="bubble-note">FAQ・履歴・議論</text>

      <rect x="610" y="362" width="160" height="72" rx="16" fill="#a6d16d"/>
      <text x="690" y="391" text-anchor="middle" class="bubble-title">公式サイト</text>
      <text x="690" y="414" text-anchor="middle" class="bubble-note">確定情報の保管</text>

      <rect x="250" y="308" width="158" height="72" rx="16" fill="#8ca5ff"/>
      <text x="329" y="337" text-anchor="middle" class="bubble-title">Discord</text>
      <text x="329" y="360" text-anchor="middle" class="bubble-note">会話・熱量維持</text>

      <rect x="440" y="288" width="158" height="72" rx="16" fill="#b8b6ff"/>
      <text x="519" y="317" text-anchor="middle" class="bubble-title">ニコニコ</text>
      <text x="519" y="340" text-anchor="middle" class="bubble-note">国内ファン深化</text>
    </g>

    <path d="M297 159 C366 184, 438 211, 496 276" fill="none" stroke="#94a3b8" stroke-width="3" stroke-dasharray="8 8"/>
    <path d="M832 182 C836 225, 836 256, 834 305" fill="none" stroke="#94a3b8" stroke-width="3" stroke-dasharray="8 8"/>
    <path d="M408 344 C476 354, 536 376, 610 398" fill="none" stroke="#94a3b8" stroke-width="3" stroke-dasharray="8 8"/>
  </g>

  <g transform="translate(104 680)">
    <circle cx="14" cy="0" r="6" fill="#19c7d4"/>
    <text x="28" y="5" class="legend">認知拡大</text>
    <circle cx="126" cy="0" r="6" fill="#8ca5ff"/>
    <text x="140" y="5" class="legend">関係深化</text>
    <circle cx="238" cy="0" r="6" fill="#7ec46d"/>
    <text x="252" y="5" class="legend">情報保存</text>
    <text x="470" y="5" class="small">※配置は優先用途の目安。実際にはタイトル規模、地域、運営リソース、プレイヤー層で調整する。</text>
  </g>
</svg>
