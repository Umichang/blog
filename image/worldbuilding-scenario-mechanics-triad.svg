<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">ゲームメカニクス、世界設定、ゲームシナリオの三つ巴</title>
  <desc id="desc">ゲームメカニクス、世界設定、ゲームシナリオの三要素が相互に影響し合い、中央の体験の一貫性を作る構造を示すインフォグラフィック。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f7faf8"/>
      <stop offset="0.55" stop-color="#f1f4f8"/>
      <stop offset="1" stop-color="#fbf5ec"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#18202a" flood-opacity="0.14"/>
    </filter>
    <marker id="arrow-coral" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="12" markerHeight="12" orient="auto-start-reverse">
      <path d="M1 1 L11 6 L1 11 Z" fill="#e95a45"/>
    </marker>
    <marker id="arrow-teal" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="12" markerHeight="12" orient="auto-start-reverse">
      <path d="M1 1 L11 6 L1 11 Z" fill="#178f87"/>
    </marker>
    <marker id="arrow-indigo" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="12" markerHeight="12" orient="auto-start-reverse">
      <path d="M1 1 L11 6 L1 11 Z" fill="#5264c8"/>
    </marker>
    <style>
      .label {
        font-family: "Hiragino Sans", "Yu Gothic", "Noto Sans JP", system-ui, sans-serif;
        fill: #1b2530;
      }
      .small {
        font-size: 27px;
      }
      .tiny {
        font-size: 22px;
      }
      .title {
        font-size: 37px;
        font-weight: 800;
      }
      .node-title {
        font-size: 34px;
        font-weight: 800;
        fill: #ffffff;
      }
      .node-text {
        font-size: 24px;
        font-weight: 600;
        fill: #ffffff;
        opacity: 0.96;
      }
      .card-title {
        font-size: 25px;
        font-weight: 800;
      }
      .card-text {
        font-size: 21px;
        font-weight: 600;
      }
      .arrow {
        fill: none;
        stroke-width: 13;
        stroke-linecap: round;
        opacity: 0.82;
      }
      .arrow-soft {
        fill: none;
        stroke: #73808d;
        stroke-width: 5;
        stroke-linecap: round;
        stroke-dasharray: 12 16;
        opacity: 0.36;
      }
    </style>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <circle cx="250" cy="155" r="120" fill="#ffffff" opacity="0.56"/>
  <circle cx="1365" cy="210" r="150" fill="#ffffff" opacity="0.5"/>
  <circle cx="1295" cy="735" r="115" fill="#ffffff" opacity="0.58"/>

  <text class="label title" x="800" y="72" text-anchor="middle">三つの力関係は、直線ではなく「三つ巴」で動く</text>
  <text class="label small" x="800" y="114" text-anchor="middle" fill="#485464">どれが上流にあるかで、ほかの二つの役割と制約が変わる</text>

  <path class="arrow" d="M690 236 C555 314 485 410 462 506" stroke="#e95a45" marker-end="url(#arrow-coral)"/>
  <path class="arrow" d="M572 630 C710 706 890 706 1028 630" stroke="#178f87" marker-end="url(#arrow-teal)"/>
  <path class="arrow" d="M1137 506 C1114 410 1045 314 910 236" stroke="#5264c8" marker-end="url(#arrow-indigo)"/>

  <path class="arrow-soft" d="M910 267 C1030 342 1090 418 1115 498"/>
  <path class="arrow-soft" d="M1025 584 C890 648 710 648 575 584"/>
  <path class="arrow-soft" d="M486 498 C510 418 570 342 690 267"/>

  <g filter="url(#shadow)">
    <rect x="572" y="146" width="456" height="166" rx="24" fill="#e95a45"/>
    <rect x="218" y="515" width="470" height="172" rx="24" fill="#178f87"/>
    <rect x="912" y="515" width="470" height="172" rx="24" fill="#5264c8"/>
    <circle cx="800" cy="442" r="124" fill="#ffffff"/>
    <circle cx="800" cy="442" r="110" fill="#f5b84f"/>
  </g>

  <text class="label node-title" x="800" y="204" text-anchor="middle">ゲームメカニクス</text>
  <text class="label node-text" x="800" y="247" text-anchor="middle">操作・ルール・勝敗・報酬</text>
  <text class="label node-text" x="800" y="282" text-anchor="middle">「何をすると楽しいのか」</text>

  <text class="label node-title" x="453" y="575" text-anchor="middle">世界設定</text>
  <text class="label node-text" x="453" y="618" text-anchor="middle">文化・技術・歴史・見た目</text>
  <text class="label node-text" x="453" y="653" text-anchor="middle">「なぜ自然に見えるのか」</text>

  <text class="label node-title" x="1147" y="575" text-anchor="middle">ゲームシナリオ</text>
  <text class="label node-text" x="1147" y="618" text-anchor="middle">目的・事件・感情の流れ</text>
  <text class="label node-text" x="1147" y="653" text-anchor="middle">「なぜ今それをするのか」</text>

  <text class="label" x="800" y="420" text-anchor="middle" font-size="35" font-weight="800" fill="#2b261b">体験の</text>
  <text class="label" x="800" y="462" text-anchor="middle" font-size="35" font-weight="800" fill="#2b261b">一貫性</text>
  <text class="label tiny" x="800" y="502" text-anchor="middle" fill="#5a4a2b" font-weight="700">遊び・理由・意味が揃う</text>

  <g>
    <rect x="350" y="352" width="284" height="54" rx="27" fill="#ffffff" opacity="0.86"/>
    <text class="label tiny" x="492" y="386" text-anchor="middle" font-weight="800" fill="#b54235">遊びを理由づける</text>
  </g>
  <g>
    <rect x="972" y="352" width="284" height="54" rx="27" fill="#ffffff" opacity="0.86"/>
    <text class="label tiny" x="1114" y="386" text-anchor="middle" font-weight="800" fill="#4658ba">行動に意味を与える</text>
  </g>
  <g>
    <rect x="627" y="712" width="346" height="54" rx="27" fill="#ffffff" opacity="0.9"/>
    <text class="label tiny" x="800" y="746" text-anchor="middle" font-weight="800" fill="#12766f">設定をプレイヤー体験へ翻訳する</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="110" y="770" width="420" height="70" rx="18" fill="#ffffff"/>
    <rect x="590" y="770" width="420" height="70" rx="18" fill="#ffffff"/>
    <rect x="1070" y="770" width="420" height="70" rx="18" fill="#ffffff"/>
  </g>
  <text class="label card-title" x="320" y="800" text-anchor="middle" fill="#e95a45">メカニクス先行</text>
  <text class="label card-text" x="320" y="830" text-anchor="middle" fill="#3d4955">例：スプラトゥーン</text>
  <text class="label card-title" x="800" y="800" text-anchor="middle" fill="#178f87">設定・シナリオ先行</text>
  <text class="label card-text" x="800" y="830" text-anchor="middle" fill="#3d4955">例：ダークソウル／エルデンリング</text>
  <text class="label card-title" x="1280" y="800" text-anchor="middle" fill="#5264c8">双方向・並行開発</text>
  <text class="label card-text" x="1280" y="830" text-anchor="middle" fill="#3d4955">例：FF14</text>
</svg>
