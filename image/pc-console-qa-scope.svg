<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" role="img" aria-labelledby="title desc">
  <title id="title">家庭用機とPC版のQA範囲の違い</title>
  <desc id="desc">家庭用ゲーム機は検証対象が限定され、PC版はGPU、VRAM、CPU、OS、ドライバ、解像度、入力機器、MOD、ランチャーなど検証軸が増える。</desc>
  <defs>
    <style>
      .bg{fill:#f6f8fb}
      .panel{fill:#fff;stroke:#d9dfeb;stroke-width:2}
      .console{fill:#e9f8ef;stroke:#4da66d;stroke-width:2}
      .pc{fill:#fff3e8;stroke:#d88945;stroke-width:2}
      .title{font:700 34px system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#1f2937}
      .head{font:700 27px system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#1f2937}
      .label{font:700 20px system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#273244}
      .small{font:600 17px system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#475569}
      .arrow{stroke:#64748b;stroke-width:4;fill:none;marker-end:url(#arrow)}
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#64748b"/>
    </marker>
  </defs>
  <rect class="bg" width="1200" height="700"/>
  <text class="title" x="60" y="68">QAの予測可能性は「検証対象の広さ」で変わる</text>

  <rect class="panel" x="70" y="115" width="480" height="500" rx="8"/>
  <text class="head" x="310" y="164" text-anchor="middle">家庭用ゲーム機</text>
  <rect class="console" x="175" y="225" width="270" height="150" rx="8"/>
  <text class="label" x="310" y="280" text-anchor="middle">固定ハード</text>
  <text class="small" x="310" y="313" text-anchor="middle">CPU / GPU / メモリ / I/O</text>
  <text class="small" x="310" y="342" text-anchor="middle">コントローラー / 表示モード</text>
  <path class="arrow" d="M310 385 L310 455"/>
  <rect class="console" x="175" y="465" width="270" height="82" rx="8"/>
  <text class="label" x="310" y="499" text-anchor="middle">同じ条件で再現しやすい</text>
  <text class="small" x="310" y="526" text-anchor="middle">調整対象を絞り込める</text>

  <rect class="panel" x="650" y="115" width="480" height="500" rx="8"/>
  <text class="head" x="890" y="164" text-anchor="middle">PC版</text>
  <g>
    <rect class="pc" x="705" y="210" width="180" height="56" rx="8"/>
    <text class="label" x="795" y="246" text-anchor="middle">GPUメーカー</text>
    <rect class="pc" x="895" y="210" width="180" height="56" rx="8"/>
    <text class="label" x="985" y="246" text-anchor="middle">VRAM容量</text>
    <rect class="pc" x="705" y="282" width="180" height="56" rx="8"/>
    <text class="label" x="795" y="318" text-anchor="middle">CPU世代</text>
    <rect class="pc" x="895" y="282" width="180" height="56" rx="8"/>
    <text class="label" x="985" y="318" text-anchor="middle">OSバージョン</text>
    <rect class="pc" x="705" y="354" width="180" height="56" rx="8"/>
    <text class="label" x="795" y="390" text-anchor="middle">ドライバ</text>
    <rect class="pc" x="895" y="354" width="180" height="56" rx="8"/>
    <text class="label" x="985" y="390" text-anchor="middle">解像度</text>
    <rect class="pc" x="705" y="426" width="180" height="56" rx="8"/>
    <text class="label" x="795" y="462" text-anchor="middle">入力機器</text>
    <rect class="pc" x="895" y="426" width="180" height="56" rx="8"/>
    <text class="label" x="985" y="462" text-anchor="middle">MOD / ランチャー</text>
  </g>
  <text class="small" x="890" y="540" text-anchor="middle">検証軸が掛け算になり、再現条件の管理が難しくなる</text>
</svg>
