<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="360" viewBox="0 0 1120 360" role="img" aria-labelledby="title desc">
  <title id="title">ファミコン時代の初心会流通ルート</title>
  <desc id="desc">ゲームメーカーから任天堂、初心会、二次問屋、全国の玩具小売店へ流れるファミコン時代の流通経路を示す図。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="11" markerHeight="11" orient="auto-start-reverse">
      <path d="M 1 1 L 11 6 L 1 11 z" fill="#3457a6"/>
    </marker>
    <filter id="shadow" x="-10%" y="-20%" width="120%" height="150%">
      <feDropShadow dx="0" dy="6" stdDeviation="6" flood-color="#1d2a44" flood-opacity="0.14"/>
    </filter>
    <style>
      .bg {
        fill: #f7f5ef;
      }
      .title {
        fill: #172033;
        font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", "Noto Sans JP", sans-serif;
        font-size: 28px;
        font-weight: 700;
      }
      .subtitle {
        fill: #5d6678;
        font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", "Noto Sans JP", sans-serif;
        font-size: 15px;
      }
      .node {
        filter: url(#shadow);
      }
      .node-rect {
        fill: #ffffff;
        stroke: #d9dfec;
        stroke-width: 2;
      }
      .node-key {
        fill: #fff8e0;
        stroke: #d7a63c;
        stroke-width: 2.5;
      }
      .node-title {
        fill: #172033;
        font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", "Noto Sans JP", sans-serif;
        font-size: 20px;
        font-weight: 700;
      }
      .node-note {
        fill: #667085;
        font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", "Noto Sans JP", sans-serif;
        font-size: 13px;
      }
      .flow {
        fill: none;
        stroke: #3457a6;
        stroke-width: 4;
        stroke-linecap: round;
        marker-end: url(#arrow);
      }
      .flow-label {
        fill: #3457a6;
        font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", "Noto Sans JP", sans-serif;
        font-size: 13px;
        font-weight: 700;
      }
      .risk {
        fill: #7f1d1d;
        font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", "Noto Sans JP", sans-serif;
        font-size: 14px;
        font-weight: 700;
      }
      .risk-line {
        fill: none;
        stroke: #b45309;
        stroke-width: 2;
        stroke-dasharray: 6 6;
      }
    </style>
  </defs>

  <rect class="bg" width="1120" height="360" rx="0"/>
  <text class="title" x="56" y="54">ファミコン時代の初心会流通ルート</text>
  <text class="subtitle" x="56" y="82">製造委託と前払いを任天堂が握り、一次問屋の初心会を通じて全国の玩具店へ流通した</text>

  <g class="node" transform="translate(56 132)">
    <rect class="node-rect" width="170" height="96" rx="8"/>
    <text class="node-title" x="85" y="40" text-anchor="middle">ゲームメーカー</text>
    <text class="node-note" x="85" y="68" text-anchor="middle">ソフト企画・開発</text>
  </g>

  <path class="flow" d="M 236 180 H 330"/>
  <text class="flow-label" x="283" y="160" text-anchor="middle">製造委託・前払い</text>

  <g class="node" transform="translate(340 132)">
    <rect class="node-key" width="170" height="96" rx="8"/>
    <text class="node-title" x="85" y="40" text-anchor="middle">任天堂</text>
    <text class="node-note" x="85" y="68" text-anchor="middle">製造・出荷管理</text>
  </g>

  <path class="flow" d="M 520 180 H 614"/>
  <text class="flow-label" x="567" y="160" text-anchor="middle">一次流通へ供給</text>

  <g class="node" transform="translate(624 132)">
    <rect class="node-key" width="170" height="96" rx="8"/>
    <text class="node-title" x="85" y="40" text-anchor="middle">初心会</text>
    <text class="node-note" x="85" y="68" text-anchor="middle">一次問屋</text>
  </g>

  <path class="flow" d="M 804 180 H 898"/>
  <text class="flow-label" x="851" y="160" text-anchor="middle">卸売</text>

  <g class="node" transform="translate(908 132)">
    <rect class="node-rect" width="156" height="96" rx="8"/>
    <text class="node-title" x="78" y="40" text-anchor="middle">二次問屋</text>
    <text class="node-note" x="78" y="68" text-anchor="middle">地域卸</text>
  </g>

  <path class="flow" d="M 986 236 C 986 272 900 292 804 292 H 732"/>
  <text class="flow-label" x="898" y="286" text-anchor="middle">小売へ配荷</text>

  <g class="node" transform="translate(512 250)">
    <rect class="node-rect" width="210" height="76" rx="8"/>
    <text class="node-title" x="105" y="34" text-anchor="middle">全国の玩具小売店</text>
    <text class="node-note" x="105" y="58" text-anchor="middle">店頭販売・在庫負担</text>
  </g>

  <path class="risk-line" d="M 166 236 C 220 298 320 318 454 292"/>
  <text class="risk" x="56" y="292">メーカー側: 先払いで量産リスクを負担</text>
  <text class="risk" x="56" y="316">問屋・小売側: 原則返品なしで在庫リスクを負担</text>
</svg>
