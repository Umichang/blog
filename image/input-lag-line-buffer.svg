<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">ラインバッファ方式の仕組み</title>
  <desc id="desc">ファミコン時代のラインバッファ方式を、処理パイプライン、保持するバッファ量、タイムラインの3段で示す図。PPUが1スキャンライン分だけを保持し、CRTの走査に同期して映像をリアルタイムに出力する。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#059669"/>
    </marker>
    <style>
      text { font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", "Noto Sans JP", sans-serif; }
      .title { fill: #0f172a; font-size: 27px; font-weight: 800; }
      .subtitle { fill: #475569; font-size: 14px; font-weight: 600; }
      .section { fill: #334155; font-size: 13px; font-weight: 700; letter-spacing: 0; }
      .node-title { fill: #0f172a; font-size: 17px; font-weight: 800; }
      .node-text { fill: #475569; font-size: 13px; }
      .small { fill: #64748b; font-size: 12px; }
      .label { fill: #334155; font-size: 13px; font-weight: 700; }
      .metric-title { fill: #0f172a; font-size: 15px; font-weight: 800; }
      .metric-body { fill: #475569; font-size: 13px; }
      .accent { fill: #047857; font-size: 14px; font-weight: 800; }
    </style>
  </defs>

  <rect width="1200" height="760" fill="#f8fafc"/>

  <text x="600" y="42" text-anchor="middle" class="title">ラインバッファ方式：作りながら表示する</text>
  <text x="600" y="68" text-anchor="middle" class="subtitle">処理単位は「スキャンライン」。画面1枚分をためず、CRTの走査に合わせて順次出力する。</text>

  <text x="56" y="106" class="section">処理パイプライン</text>

  <!-- CPU / VRAM -->
  <rect x="48" y="124" width="230" height="176" rx="8" fill="#f5f3ff" stroke="#7c3aed" stroke-width="2"/>
  <text x="163" y="156" text-anchor="middle" class="node-title">CPU / VRAM</text>
  <text x="163" y="181" text-anchor="middle" class="node-text">ゲーム状態とタイル情報を保持</text>
  <rect x="80" y="202" width="166" height="56" rx="6" fill="#ede9fe" stroke="#c4b5fd"/>
  <line x1="80" y1="220" x2="246" y2="220" stroke="#c4b5fd"/>
  <line x1="80" y1="239" x2="246" y2="239" stroke="#c4b5fd"/>
  <line x1="135" y1="202" x2="135" y2="258" stroke="#c4b5fd"/>
  <line x1="191" y1="202" x2="191" y2="258" stroke="#c4b5fd"/>
  <text x="163" y="278" text-anchor="middle" class="small">VBI中に次フレーム用データを更新</text>

  <path d="M 284 212 L 337 212" stroke="#475569" stroke-width="2.4" fill="none" marker-end="url(#arrow)"/>
  <text x="311" y="199" text-anchor="middle" class="small">タイル</text>
  <text x="311" y="226" text-anchor="middle" class="small">属性</text>

  <!-- PPU -->
  <rect x="344" y="124" width="230" height="176" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
  <text x="459" y="156" text-anchor="middle" class="node-title">PPU</text>
  <text x="459" y="181" text-anchor="middle" class="node-text">背景・スプライトを合成</text>
  <rect x="380" y="204" width="158" height="26" rx="5" fill="#dbeafe" stroke="#93c5fd"/>
  <rect x="380" y="238" width="158" height="26" rx="5" fill="#dbeafe" stroke="#93c5fd"/>
  <text x="459" y="222" text-anchor="middle" fill="#1d4ed8" font-size="12" font-weight="700">現在ラインを生成</text>
  <text x="459" y="256" text-anchor="middle" fill="#1d4ed8" font-size="12" font-weight="700">次ラインを準備</text>
  <text x="459" y="278" text-anchor="middle" class="small">水平帰線期間ごとに進む</text>

  <path d="M 580 212 L 633 212" stroke="#475569" stroke-width="2.4" fill="none" marker-end="url(#arrow)"/>
  <text x="607" y="199" text-anchor="middle" class="small">1本分</text>
  <text x="607" y="226" text-anchor="middle" class="small">だけ</text>

  <!-- Line buffer -->
  <rect x="640" y="124" width="230" height="176" rx="8" fill="#ecfdf5" stroke="#059669" stroke-width="2"/>
  <text x="755" y="156" text-anchor="middle" class="node-title">ラインバッファ</text>
  <text x="755" y="181" text-anchor="middle" class="node-text">保持するのは次の水平線だけ</text>
  <rect x="681" y="207" width="148" height="58" rx="5" fill="#dcfce7" stroke="#86efac"/>
  <line x1="681" y1="221" x2="829" y2="221" stroke="#bbf7d0"/>
  <line x1="681" y1="236" x2="829" y2="236" stroke="#bbf7d0"/>
  <line x1="681" y1="251" x2="829" y2="251" stroke="#bbf7d0"/>
  <rect x="681" y="233" width="148" height="8" fill="#10b981"/>
  <text x="755" y="281" text-anchor="middle" class="accent">画面1枚分の保持なし</text>

  <path d="M 876 212 L 929 212" stroke="#059669" stroke-width="2.4" fill="none" marker-end="url(#arrow-green)"/>
  <text x="903" y="198" text-anchor="middle" class="small">映像</text>
  <text x="903" y="226" text-anchor="middle" class="small">信号</text>

  <!-- CRT -->
  <rect x="936" y="124" width="216" height="176" rx="8" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
  <text x="1044" y="156" text-anchor="middle" class="node-title">CRT</text>
  <text x="1044" y="181" text-anchor="middle" class="node-text">受け取った順に発光</text>
  <rect x="975" y="201" width="138" height="78" rx="5" fill="#0f172a" stroke="#334155"/>
  <rect x="982" y="208" width="124" height="10" fill="#60a5fa"/>
  <rect x="982" y="222" width="124" height="10" fill="#60a5fa"/>
  <rect x="982" y="236" width="88" height="10" fill="#60a5fa"/>
  <rect x="1070" y="236" width="36" height="10" fill="#14532d"/>
  <line x1="1070" y1="241" x2="1104" y2="241" stroke="#fbbf24" stroke-width="2" stroke-dasharray="5 4"/>
  <circle cx="1070" cy="241" r="4" fill="#fbbf24"/>
  <rect x="982" y="250" width="124" height="10" fill="#14532d"/>
  <rect x="982" y="264" width="124" height="10" fill="#14532d"/>

  <!-- Metrics -->
  <text x="56" y="350" class="section">比較の要点</text>
  <rect x="48" y="370" width="344" height="102" rx="8" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="76" y="405" class="metric-title">保持するバッファ量</text>
  <text x="76" y="433" class="metric-body">1スキャンライン分だけ。</text>
  <text x="76" y="454" class="metric-body">フレームバッファ用の大きなVRAMは不要。</text>

  <rect x="428" y="370" width="344" height="102" rx="8" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="456" y="405" class="metric-title">同期の単位</text>
  <text x="456" y="433" class="metric-body">H-blankごとに次ラインを準備。</text>
  <text x="456" y="454" class="metric-body">VBIはCPUがVRAMを更新する時間。</text>

  <rect x="808" y="370" width="344" height="102" rx="8" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="836" y="405" class="metric-title">遅延の性質</text>
  <text x="836" y="433" class="metric-body">表示待ちは走査位置にほぼ限定。</text>
  <text x="836" y="454" class="metric-body">「完成した画面」を待つ段階がない。</text>

  <!-- Timeline -->
  <text x="56" y="522" class="section">1フレーム内の時間の流れ（約16.7ms / 60fps）</text>
  <rect x="48" y="546" width="1104" height="102" rx="8" fill="#ffffff" stroke="#cbd5e1"/>

  <rect x="72" y="580" width="74" height="34" rx="3" fill="#dbeafe" stroke="#93c5fd"/>
  <rect x="151" y="580" width="12" height="34" rx="2" fill="#fef3c7" stroke="#facc15"/>
  <rect x="168" y="580" width="74" height="34" rx="3" fill="#dbeafe" stroke="#93c5fd"/>
  <rect x="247" y="580" width="12" height="34" rx="2" fill="#fef3c7" stroke="#facc15"/>
  <rect x="264" y="580" width="74" height="34" rx="3" fill="#dbeafe" stroke="#93c5fd"/>
  <rect x="343" y="580" width="12" height="34" rx="2" fill="#fef3c7" stroke="#facc15"/>
  <rect x="360" y="580" width="74" height="34" rx="3" fill="#dbeafe" stroke="#93c5fd"/>
  <text x="486" y="604" text-anchor="middle" fill="#94a3b8" font-size="22" font-weight="800">...</text>
  <rect x="534" y="580" width="84" height="34" rx="3" fill="#dbeafe" stroke="#93c5fd"/>
  <rect x="623" y="580" width="12" height="34" rx="2" fill="#fef3c7" stroke="#facc15"/>
  <rect x="640" y="580" width="84" height="34" rx="3" fill="#dbeafe" stroke="#93c5fd"/>
  <rect x="729" y="580" width="12" height="34" rx="2" fill="#fef3c7" stroke="#facc15"/>
  <rect x="746" y="580" width="84" height="34" rx="3" fill="#dbeafe" stroke="#93c5fd"/>
  <rect x="835" y="580" width="12" height="34" rx="2" fill="#fef3c7" stroke="#facc15"/>
  <rect x="852" y="580" width="276" height="34" rx="3" fill="#fee2e2" stroke="#fca5a5"/>

  <text x="109" y="602" text-anchor="middle" fill="#1d4ed8" font-size="12" font-weight="800">L1</text>
  <text x="205" y="602" text-anchor="middle" fill="#1d4ed8" font-size="12" font-weight="800">L2</text>
  <text x="301" y="602" text-anchor="middle" fill="#1d4ed8" font-size="12" font-weight="800">L3</text>
  <text x="397" y="602" text-anchor="middle" fill="#1d4ed8" font-size="12" font-weight="800">L4</text>
  <text x="576" y="602" text-anchor="middle" fill="#1d4ed8" font-size="12" font-weight="800">L238</text>
  <text x="682" y="602" text-anchor="middle" fill="#1d4ed8" font-size="12" font-weight="800">L239</text>
  <text x="788" y="602" text-anchor="middle" fill="#1d4ed8" font-size="12" font-weight="800">L240</text>
  <text x="990" y="602" text-anchor="middle" fill="#991b1b" font-size="12" font-weight="800">VBI：CPUがVRAM更新</text>

  <path d="M 72 566 L 830 566" stroke="#059669" stroke-width="2.4" fill="none" marker-end="url(#arrow-green)"/>
  <text x="451" y="558" text-anchor="middle" fill="#047857" font-size="13" font-weight="800">1ライン作る → すぐ出す → 次ラインへ</text>

  <rect x="48" y="676" width="1104" height="44" rx="8" fill="#ecfdf5" stroke="#a7f3d0"/>
  <text x="600" y="704" text-anchor="middle" fill="#047857" font-size="16" font-weight="800">低遅延の理由：バッファに「画面1枚」をためず、走査線単位で表示へ流す</text>
</svg>
