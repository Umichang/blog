<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="720" viewBox="0 0 1400 720" role="img" aria-labelledby="title3 desc3">
  <title id="title3">CRTと液晶モニターの映像処理比較</title>
  <desc id="desc3">CRT（ブラウン管）と液晶モニター（通常モード・ゲームモード）の映像処理フローを比較した図。CRTはアナログ信号を直接表示するため遅延がほぼゼロだが、液晶は映像エンジンによる処理のため遅延が生じる。ゲームモードでは処理をバイパスして遅延を削減する。</desc>
  <defs>
    <marker id="arrD" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
    <marker id="arrG" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#16a34a"/>
    </marker>
    <marker id="arrO" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#ea580c"/>
    </marker>
  </defs>

  <rect width="1400" height="720" fill="#f8fafc"/>

  <!-- Title -->
  <text x="700" y="44" text-anchor="middle" fill="#0f172a" font-family="sans-serif" font-size="26" font-weight="700">CRTと液晶モニターの映像処理比較</text>

  <!-- ====== COLUMN HEADERS ====== -->
  <rect x="22" y="60" width="420" height="44" rx="8" fill="#1e293b" stroke="#475569" stroke-width="2"/>
  <text x="232" y="88" text-anchor="middle" fill="#e2e8f0" font-family="sans-serif" font-size="18" font-weight="700">CRT（ブラウン管）</text>

  <rect x="490" y="60" width="420" height="44" rx="8" fill="#7c2d12" stroke="#ea580c" stroke-width="2"/>
  <text x="700" y="88" text-anchor="middle" fill="#fed7aa" font-family="sans-serif" font-size="18" font-weight="700">液晶（通常モード）</text>

  <rect x="958" y="60" width="420" height="44" rx="8" fill="#14532d" stroke="#16a34a" stroke-width="2"/>
  <text x="1168" y="88" text-anchor="middle" fill="#bbf7d0" font-family="sans-serif" font-size="18" font-weight="700">液晶（ゲームモード）</text>

  <!-- ============================== -->
  <!-- COLUMN 1: CRT                  -->
  <!-- ============================== -->

  <!-- Stage 1: Signal Input -->
  <rect x="62" y="122" width="340" height="66" rx="8" fill="#334155" stroke="#64748b" stroke-width="2"/>
  <text x="232" y="148" text-anchor="middle" fill="#e2e8f0" font-family="sans-serif" font-size="14" font-weight="700">アナログ映像信号入力</text>
  <text x="232" y="167" text-anchor="middle" fill="#94a3b8" font-family="sans-serif" font-size="13">コンポジット / RGB / コンポーネント</text>

  <path d="M 232 190 L 232 210" stroke="#475569" stroke-width="2.5" fill="none" marker-end="url(#arrD)"/>

  <!-- Stage 2: Electron Gun -->
  <rect x="62" y="212" width="340" height="66" rx="8" fill="#334155" stroke="#64748b" stroke-width="2"/>
  <text x="232" y="238" text-anchor="middle" fill="#e2e8f0" font-family="sans-serif" font-size="14" font-weight="700">電子銃（Electron Gun）</text>
  <text x="232" y="257" text-anchor="middle" fill="#94a3b8" font-family="sans-serif" font-size="13">アナログ信号を電子ビームに変換</text>

  <path d="M 232 280 L 232 300" stroke="#475569" stroke-width="2.5" fill="none" marker-end="url(#arrD)"/>

  <!-- Stage 3: Deflection -->
  <rect x="62" y="302" width="340" height="66" rx="8" fill="#334155" stroke="#64748b" stroke-width="2"/>
  <text x="232" y="328" text-anchor="middle" fill="#e2e8f0" font-family="sans-serif" font-size="14" font-weight="700">偏向コイルによる走査制御</text>
  <text x="232" y="347" text-anchor="middle" fill="#94a3b8" font-family="sans-serif" font-size="13">ビームを左上→右下へリアルタイム誘導</text>

  <path d="M 232 370 L 232 390" stroke="#475569" stroke-width="2.5" fill="none" marker-end="url(#arrD)"/>

  <!-- Stage 4: Phosphor -->
  <rect x="62" y="392" width="340" height="66" rx="8" fill="#334155" stroke="#64748b" stroke-width="2"/>
  <text x="232" y="418" text-anchor="middle" fill="#e2e8f0" font-family="sans-serif" font-size="14" font-weight="700">蛍光体（Phosphor）発光</text>
  <text x="232" y="437" text-anchor="middle" fill="#94a3b8" font-family="sans-serif" font-size="13">ビーム照射で即座に発光・表示</text>

  <path d="M 232 460 L 232 480" stroke="#475569" stroke-width="2.5" fill="none" marker-end="url(#arrD)"/>

  <!-- CRT Output -->
  <rect x="62" y="482" width="340" height="76" rx="8" fill="#0f172a" stroke="#22c55e" stroke-width="2.5"/>
  <text x="232" y="512" text-anchor="middle" fill="#22c55e" font-family="sans-serif" font-size="16" font-weight="700">表示完了</text>
  <text x="232" y="532" text-anchor="middle" fill="#4ade80" font-family="sans-serif" font-size="13">中間デジタル処理ゼロ</text>
  <text x="232" y="550" text-anchor="middle" fill="#4ade80" font-family="sans-serif" font-size="13">遅延: &lt; 1ms（マイクロ秒単位）</text>

  <!-- CRT advantage note -->
  <rect x="62" y="576" width="340" height="80" rx="8" fill="#052e16" stroke="#22c55e" stroke-width="1.5"/>
  <text x="232" y="602" text-anchor="middle" fill="#86efac" font-family="sans-serif" font-size="13" font-weight="700">CRTの優位性</text>
  <text x="232" y="620" text-anchor="middle" fill="#4ade80" font-family="sans-serif" font-size="13">・処理段階が少なく構造的に低遅延</text>
  <text x="232" y="638" text-anchor="middle" fill="#4ade80" font-family="sans-serif" font-size="13">・格闘ゲームプロが現在も愛用</text>
  <text x="232" y="656" text-anchor="middle" fill="#4ade80" font-family="sans-serif" font-size="13">・応答速度 1ms 未満（実測値）</text>

  <!-- ============================== -->
  <!-- COLUMN 2: LCD Normal Mode      -->
  <!-- ============================== -->

  <!-- Stage 1: Signal Input -->
  <rect x="530" y="122" width="340" height="66" rx="8" fill="#7c2d12" stroke="#ea580c" stroke-width="2"/>
  <text x="700" y="148" text-anchor="middle" fill="#fed7aa" font-family="sans-serif" font-size="14" font-weight="700">デジタル映像信号入力</text>
  <text x="700" y="167" text-anchor="middle" fill="#fdba74" font-family="sans-serif" font-size="13">HDMI / DisplayPort</text>

  <path d="M 700 190 L 700 210" stroke="#ea580c" stroke-width="2.5" fill="none" marker-end="url(#arrO)"/>

  <!-- Stage 2: Frame Buffer (receiver) -->
  <rect x="530" y="212" width="340" height="66" rx="8" fill="#7c2d12" stroke="#ea580c" stroke-width="2"/>
  <text x="700" y="238" text-anchor="middle" fill="#fed7aa" font-family="sans-serif" font-size="14" font-weight="700">フレームバッファ受信</text>
  <text x="700" y="257" text-anchor="middle" fill="#fdba74" font-family="sans-serif" font-size="13">映像エンジンへ転送・蓄積</text>

  <path d="M 700 280 L 700 300" stroke="#ea580c" stroke-width="2.5" fill="none" marker-end="url(#arrO)"/>

  <!-- Stage 3: Image Engine (heavy processing) - larger box -->
  <rect x="530" y="302" width="340" height="150" rx="8" fill="#431407" stroke="#f97316" stroke-width="2.5"/>
  <text x="700" y="330" text-anchor="middle" fill="#fed7aa" font-family="sans-serif" font-size="14" font-weight="700">映像エンジン（高度処理）</text>
  <text x="700" y="352" text-anchor="middle" fill="#fb923c" font-family="sans-serif" font-size="13">・スケーリング / 解像度変換</text>
  <text x="700" y="370" text-anchor="middle" fill="#fb923c" font-family="sans-serif" font-size="13">・色補正 / HDRトーンマッピング</text>
  <text x="700" y="388" text-anchor="middle" fill="#fb923c" font-family="sans-serif" font-size="13">・ノイズ除去処理</text>
  <text x="700" y="406" text-anchor="middle" fill="#fb923c" font-family="sans-serif" font-size="13">・倍速（フレーム補間）処理</text>
  <text x="700" y="424" text-anchor="middle" fill="#f97316" font-family="sans-serif" font-size="12" font-weight="700">← 各処理に最低1フレーム以上の遅延</text>
  <text x="700" y="440" text-anchor="middle" fill="#f97316" font-family="sans-serif" font-size="12" font-weight="700">　　倍速は1フレーム+解析時間が必要</text>

  <path d="M 700 454 L 700 474" stroke="#ea580c" stroke-width="2.5" fill="none" marker-end="url(#arrO)"/>

  <!-- Stage 4: LCD Panel -->
  <rect x="530" y="476" width="340" height="66" rx="8" fill="#7c2d12" stroke="#ea580c" stroke-width="2"/>
  <text x="700" y="502" text-anchor="middle" fill="#fed7aa" font-family="sans-serif" font-size="14" font-weight="700">液晶パネル出力</text>
  <text x="700" y="521" text-anchor="middle" fill="#fdba74" font-family="sans-serif" font-size="13">ピクセル応答: 7〜14ms（VA/IPS）</text>

  <path d="M 700 544 L 700 564" stroke="#ea580c" stroke-width="2.5" fill="none" marker-end="url(#arrO)"/>

  <!-- LCD Normal Output -->
  <rect x="530" y="566" width="340" height="60" rx="8" fill="#450a0a" stroke="#dc2626" stroke-width="2.5"/>
  <text x="700" y="592" text-anchor="middle" fill="#fca5a5" font-family="sans-serif" font-size="16" font-weight="700">表示完了</text>
  <text x="700" y="612" text-anchor="middle" fill="#fca5a5" font-family="sans-serif" font-size="13">遅延: 30〜100ms（モード・機種による）</text>

  <!-- LCD Normal note -->
  <rect x="530" y="642" width="340" height="54" rx="8" fill="#450a0a" stroke="#dc2626" stroke-width="1.5"/>
  <text x="700" y="664" text-anchor="middle" fill="#fca5a5" font-family="sans-serif" font-size="13">倍速・ノイズ除去・色補正が有効だと</text>
  <text x="700" y="682" text-anchor="middle" fill="#fca5a5" font-family="sans-serif" font-size="13">60fps環境で最大6フレーム分の遅延も</text>

  <!-- ============================== -->
  <!-- COLUMN 3: LCD Game Mode        -->
  <!-- ============================== -->

  <!-- Stage 1: Signal Input -->
  <rect x="998" y="122" width="340" height="66" rx="8" fill="#14532d" stroke="#16a34a" stroke-width="2"/>
  <text x="1168" y="148" text-anchor="middle" fill="#bbf7d0" font-family="sans-serif" font-size="14" font-weight="700">デジタル映像信号入力</text>
  <text x="1168" y="167" text-anchor="middle" fill="#86efac" font-family="sans-serif" font-size="13">HDMI / DisplayPort（同上）</text>

  <path d="M 1168 190 L 1168 210" stroke="#16a34a" stroke-width="2.5" fill="none" marker-end="url(#arrG)"/>

  <!-- Stage 2: Frame Buffer (receiver) -->
  <rect x="998" y="212" width="340" height="66" rx="8" fill="#14532d" stroke="#16a34a" stroke-width="2"/>
  <text x="1168" y="238" text-anchor="middle" fill="#bbf7d0" font-family="sans-serif" font-size="14" font-weight="700">フレームバッファ受信</text>
  <text x="1168" y="257" text-anchor="middle" fill="#86efac" font-family="sans-serif" font-size="13">映像エンジンへ転送</text>

  <path d="M 1168 280 L 1168 300" stroke="#16a34a" stroke-width="2.5" fill="none" marker-end="url(#arrG)"/>

  <!-- Stage 3: Image Engine BYPASS (game mode) -->
  <rect x="998" y="302" width="340" height="150" rx="8" fill="#052e16" stroke="#22c55e" stroke-width="2.5"/>
  <text x="1168" y="330" text-anchor="middle" fill="#bbf7d0" font-family="sans-serif" font-size="14" font-weight="700">映像エンジン（ゲームモード）</text>
  <text x="1168" y="352" text-anchor="middle" fill="#4ade80" font-family="sans-serif" font-size="13">・スケーリングのみ（最小限）</text>

  <!-- Strikethrough items (bypassed) -->
  <text x="1168" y="376" text-anchor="middle" fill="#64748b" font-family="sans-serif" font-size="13" text-decoration="line-through">・色補正 / HDRトーンマッピング</text>
  <line x1="1010" y1="374" x2="1326" y2="374" stroke="#475569" stroke-width="1.5"/>
  <text x="1168" y="400" text-anchor="middle" fill="#64748b" font-family="sans-serif" font-size="13">・ノイズ除去処理</text>
  <line x1="1010" y1="398" x2="1326" y2="398" stroke="#475569" stroke-width="1.5"/>
  <text x="1168" y="424" text-anchor="middle" fill="#64748b" font-family="sans-serif" font-size="13">・倍速（フレーム補間）処理</text>
  <line x1="1010" y1="422" x2="1326" y2="422" stroke="#475569" stroke-width="1.5"/>

  <text x="1168" y="444" text-anchor="middle" fill="#22c55e" font-family="sans-serif" font-size="12" font-weight="700">← 不要な処理をバイパスして低遅延化</text>

  <path d="M 1168 454 L 1168 474" stroke="#16a34a" stroke-width="2.5" fill="none" marker-end="url(#arrG)"/>

  <!-- Stage 4: LCD Panel -->
  <rect x="998" y="476" width="340" height="66" rx="8" fill="#14532d" stroke="#16a34a" stroke-width="2"/>
  <text x="1168" y="502" text-anchor="middle" fill="#bbf7d0" font-family="sans-serif" font-size="14" font-weight="700">液晶パネル出力</text>
  <text x="1168" y="521" text-anchor="middle" fill="#86efac" font-family="sans-serif" font-size="13">ピクセル応答: 7〜14ms（VA/IPS）</text>

  <path d="M 1168 544 L 1168 564" stroke="#16a34a" stroke-width="2.5" fill="none" marker-end="url(#arrG)"/>

  <!-- LCD Game Mode Output -->
  <rect x="998" y="566" width="340" height="60" rx="8" fill="#052e16" stroke="#16a34a" stroke-width="2.5"/>
  <text x="1168" y="592" text-anchor="middle" fill="#4ade80" font-family="sans-serif" font-size="16" font-weight="700">表示完了</text>
  <text x="1168" y="612" text-anchor="middle" fill="#4ade80" font-family="sans-serif" font-size="13">遅延: 1〜15ms（機種・パネルによる）</text>

  <!-- LCD Game Mode note -->
  <rect x="998" y="642" width="340" height="54" rx="8" fill="#052e16" stroke="#22c55e" stroke-width="1.5"/>
  <text x="1168" y="664" text-anchor="middle" fill="#86efac" font-family="sans-serif" font-size="13">ALLM（自動低遅延モード）で</text>
  <text x="1168" y="682" text-anchor="middle" fill="#86efac" font-family="sans-serif" font-size="13">ゲーム起動時に自動切替も可能</text>

  <!-- ====== LATENCY COMPARISON BAR ====== -->
  <!-- Visual bar showing relative latency -->
  <text x="700" y="718" text-anchor="middle" fill="#64748b" font-family="sans-serif" font-size="12">遅延の目安: CRT ≈ 0ms ／ 液晶ゲームモード 1〜15ms ／ 液晶通常モード 30〜100ms</text>
</svg>
