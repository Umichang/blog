<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">フレームバッファ方式とダブルバッファリング</title>
  <desc id="desc">フレームバッファ方式とダブルバッファリングを、処理パイプライン、保持するバッファ量、タイムラインの3段で示す図。GPUがバックバッファに1フレーム分を描画し、垂直同期でフロントバッファと交換して表示する。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
    <marker id="arrow-orange" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#ea580c"/>
    </marker>
    <style>
      text { font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", "Noto Sans JP", sans-serif; }
      .title { fill: #0f172a; font-size: 27px; font-weight: 800; }
      .subtitle { fill: #475569; font-size: 14px; font-weight: 600; }
      .section { fill: #334155; font-size: 13px; font-weight: 700; letter-spacing: 0; }
      .node-title { fill: #0f172a; font-size: 17px; font-weight: 800; }
      .node-text { fill: #475569; font-size: 13px; }
      .small { fill: #64748b; font-size: 12px; }
      .metric-title { fill: #0f172a; font-size: 15px; font-weight: 800; }
      .metric-body { fill: #475569; font-size: 13px; }
      .accent { fill: #c2410c; font-size: 14px; font-weight: 800; }
    </style>
  </defs>

  <rect width="1200" height="760" fill="#f8fafc"/>

  <text x="600" y="42" text-anchor="middle" class="title">フレームバッファ方式：描き終えてから表示する</text>
  <text x="600" y="68" text-anchor="middle" class="subtitle">処理単位は「フレーム」。GPUが画面1枚分を描き、V-syncで表示用バッファと交換する。</text>

  <text x="56" y="106" class="section">処理パイプライン</text>

  <!-- CPU -->
  <rect x="48" y="124" width="230" height="176" rx="8" fill="#f5f3ff" stroke="#7c3aed" stroke-width="2"/>
  <text x="163" y="156" text-anchor="middle" class="node-title">CPU / ゲームロジック</text>
  <text x="163" y="181" text-anchor="middle" class="node-text">入力を読み、次の画面を決める</text>
  <rect x="79" y="204" width="168" height="28" rx="5" fill="#ede9fe" stroke="#c4b5fd"/>
  <rect x="79" y="242" width="168" height="28" rx="5" fill="#ede9fe" stroke="#c4b5fd"/>
  <text x="163" y="223" text-anchor="middle" fill="#6d28d9" font-size="12" font-weight="700">入力サンプル</text>
  <text x="163" y="261" text-anchor="middle" fill="#6d28d9" font-size="12" font-weight="700">描画コマンド生成</text>

  <path d="M 284 212 L 337 212" stroke="#475569" stroke-width="2.4" fill="none" marker-end="url(#arrow)"/>
  <text x="311" y="199" text-anchor="middle" class="small">描画</text>
  <text x="311" y="226" text-anchor="middle" class="small">命令</text>

  <!-- GPU -->
  <rect x="344" y="124" width="230" height="176" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="2"/>
  <text x="459" y="156" text-anchor="middle" class="node-title">GPU</text>
  <text x="459" y="181" text-anchor="middle" class="node-text">1フレーム分をまとめて描画</text>
  <rect x="382" y="204" width="154" height="26" rx="5" fill="#ffedd5" stroke="#fdba74"/>
  <rect x="382" y="238" width="154" height="26" rx="5" fill="#ffedd5" stroke="#fdba74"/>
  <text x="459" y="222" text-anchor="middle" fill="#c2410c" font-size="12" font-weight="700">3D演算・ラスタライズ</text>
  <text x="459" y="256" text-anchor="middle" fill="#c2410c" font-size="12" font-weight="700">ピクセルを書き込み</text>

  <path d="M 580 212 L 633 212" stroke="#ea580c" stroke-width="2.4" fill="none" marker-end="url(#arrow-orange)"/>
  <text x="607" y="199" text-anchor="middle" class="small">画面</text>
  <text x="607" y="226" text-anchor="middle" class="small">1枚分</text>

  <!-- Back buffer -->
  <rect x="640" y="124" width="230" height="176" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="2"/>
  <text x="755" y="156" text-anchor="middle" class="node-title">バックバッファ</text>
  <text x="755" y="181" text-anchor="middle" class="node-text">描画中。まだ表示しない</text>
  <rect x="681" y="205" width="148" height="72" rx="5" fill="#ffedd5" stroke="#fdba74"/>
  <line x1="681" y1="223" x2="829" y2="223" stroke="#fed7aa"/>
  <line x1="681" y1="241" x2="829" y2="241" stroke="#fed7aa"/>
  <line x1="681" y1="259" x2="829" y2="259" stroke="#fed7aa"/>
  <line x1="718" y1="205" x2="718" y2="277" stroke="#fed7aa"/>
  <line x1="755" y1="205" x2="755" y2="277" stroke="#fed7aa"/>
  <line x1="792" y1="205" x2="792" y2="277" stroke="#fed7aa"/>
  <text x="755" y="247" text-anchor="middle" fill="#c2410c" font-size="12" font-weight="800">完成待ち</text>

  <path d="M 876 212 L 929 212" stroke="#475569" stroke-width="2.4" fill="none" marker-end="url(#arrow)"/>
  <text x="903" y="197" text-anchor="middle" class="small">V-sync</text>
  <text x="903" y="226" text-anchor="middle" class="small">交換</text>

  <!-- Front buffer and display -->
  <rect x="936" y="124" width="216" height="176" rx="8" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
  <text x="1044" y="156" text-anchor="middle" class="node-title">フロントバッファ</text>
  <text x="1044" y="181" text-anchor="middle" class="node-text">表示中の完成フレーム</text>
  <rect x="975" y="201" width="138" height="78" rx="5" fill="#0f172a" stroke="#334155"/>
  <rect x="983" y="209" width="122" height="54" fill="#60a5fa"/>
  <rect x="983" y="252" width="122" height="11" fill="#16a34a"/>
  <rect x="983" y="263" width="122" height="9" fill="#854d0e"/>
  <rect x="1011" y="229" width="24" height="24" fill="#f97316"/>
  <rect x="1024" y="220" width="22" height="15" fill="#fde047"/>
  <rect x="1066" y="233" width="20" height="30" fill="#22c55e"/>

  <!-- Metrics -->
  <text x="56" y="350" class="section">比較の要点</text>
  <rect x="48" y="370" width="344" height="102" rx="8" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="76" y="405" class="metric-title">保持するバッファ量</text>
  <text x="76" y="433" class="metric-body">フロントとバックの2画面分。</text>
  <text x="76" y="454" class="metric-body">高機能な描画と引き換えにVRAMを使う。</text>

  <rect x="428" y="370" width="344" height="102" rx="8" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="456" y="405" class="metric-title">同期の単位</text>
  <text x="456" y="433" class="metric-body">V-syncごとにバッファを交換。</text>
  <text x="456" y="454" class="metric-body">描画中の画面を見せずティアリングを防ぐ。</text>

  <rect x="808" y="370" width="344" height="102" rx="8" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="836" y="405" class="metric-title">遅延の性質</text>
  <text x="836" y="433" class="metric-body">入力反映後も表示切替まで待つ。</text>
  <text x="836" y="454" class="metric-body">60fpsでは最大約16.7msの待ちが増える。</text>

  <!-- Timeline -->
  <text x="56" y="522" class="section">1フレーム内の時間の流れ（約16.7ms / 60fps）</text>
  <rect x="48" y="546" width="1104" height="102" rx="8" fill="#ffffff" stroke="#cbd5e1"/>

  <rect x="72" y="580" width="320" height="34" rx="3" fill="#ffedd5" stroke="#fdba74"/>
  <rect x="396" y="580" width="18" height="34" rx="2" fill="#cffafe" stroke="#67e8f9"/>
  <rect x="418" y="580" width="320" height="34" rx="3" fill="#ffedd5" stroke="#fdba74"/>
  <rect x="742" y="580" width="18" height="34" rx="2" fill="#cffafe" stroke="#67e8f9"/>
  <rect x="764" y="580" width="320" height="34" rx="3" fill="#ffedd5" stroke="#fdba74"/>
  <rect x="1088" y="580" width="18" height="34" rx="2" fill="#cffafe" stroke="#67e8f9"/>

  <text x="232" y="602" text-anchor="middle" fill="#c2410c" font-size="12" font-weight="800">フレームNをバックバッファへ描画</text>
  <text x="405" y="602" text-anchor="middle" fill="#0e7490" font-size="11" font-weight="800">交換</text>
  <text x="578" y="602" text-anchor="middle" fill="#c2410c" font-size="12" font-weight="800">フレームN+1をバックバッファへ描画</text>
  <text x="751" y="602" text-anchor="middle" fill="#0e7490" font-size="11" font-weight="800">交換</text>
  <text x="924" y="602" text-anchor="middle" fill="#c2410c" font-size="12" font-weight="800">フレームN+2をバックバッファへ描画</text>
  <text x="1097" y="602" text-anchor="middle" fill="#0e7490" font-size="11" font-weight="800">交換</text>

  <line x1="452" y1="558" x2="452" y2="636" stroke="#dc2626" stroke-width="2" stroke-dasharray="5 4"/>
  <circle cx="452" cy="580" r="5" fill="#dc2626"/>
  <text x="452" y="556" text-anchor="middle" fill="#dc2626" font-size="12" font-weight="800">入力</text>
  <path d="M 456 632 L 738 632" stroke="#dc2626" stroke-width="2.4" fill="none" marker-end="url(#arrow)"/>
  <text x="597" y="628" text-anchor="middle" fill="#dc2626" font-size="13" font-weight="800">次のV-syncまで表示切替を待つ</text>

  <path d="M 72 566 L 1084 566" stroke="#ea580c" stroke-width="2.4" fill="none" marker-end="url(#arrow-orange)"/>
  <text x="578" y="558" text-anchor="middle" fill="#c2410c" font-size="13" font-weight="800">1フレーム描く → V-syncで交換 → 次フレームへ</text>

  <rect x="48" y="676" width="1104" height="44" rx="8" fill="#fff7ed" stroke="#fed7aa"/>
  <text x="600" y="704" text-anchor="middle" fill="#c2410c" font-size="16" font-weight="800">遅延が増える理由：画面1枚を完成させ、交換タイミングまで表示を待つ</text>
</svg>
