<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">ヒステリシスの概念図</title>
  <desc id="desc">時間に対する観測値の推移と、易しくする閾値、元へ戻す閾値、介入発動、介入解除、不感帯を示す図。</desc>
  <defs>
    <marker id="arrow-black" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L12,6 L0,12 Z" fill="#151515"/>
    </marker>
    <marker id="arrow-red" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L11,5.5 L0,11 Z" fill="#b91c1c"/>
    </marker>
    <marker id="arrow-blue" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L11,5.5 L0,11 Z" fill="#1d4ed8"/>
    </marker>
  </defs>
  <rect width="1600" height="900" fill="#ffffff"/>
  <rect x="155" y="310" width="1230" height="250" fill="#dbeafe" opacity="0.45"/>
  <g font-family="'Hiragino Sans', 'Noto Sans CJK JP', 'Yu Gothic', sans-serif" font-weight="700">
    <line x1="160" y1="785" x2="1490" y2="785" stroke="#151515" stroke-width="7" marker-end="url(#arrow-black)"/>
    <line x1="160" y1="785" x2="160" y2="65" stroke="#151515" stroke-width="7" marker-end="url(#arrow-black)"/>
    <text x="800" y="865" font-size="48" text-anchor="middle" fill="#151515">時間</text>
    <text x="92" y="430" font-size="46" text-anchor="middle" fill="#151515" writing-mode="tb">観測値</text>

    <line x1="170" y1="310" x2="1260" y2="310" stroke="#b91c1c" stroke-width="6" stroke-linecap="round" stroke-dasharray="14 18"/>
    <line x1="170" y1="560" x2="1260" y2="560" stroke="#1d4ed8" stroke-width="6" stroke-linecap="round" stroke-dasharray="14 18"/>
    <text x="1285" y="323" font-size="38" fill="#b91c1c">易しくする閾値</text>
    <text x="1285" y="573" font-size="38" fill="#1d4ed8">元へ戻す閾値</text>

    <path d="M205,605 C315,575 405,505 495,310 C575,145 770,105 895,205 C1005,295 1010,430 1118,560 C1198,655 1325,690 1425,630"
          fill="none" stroke="#0f5dbb" stroke-width="9" stroke-linecap="round"/>
    <circle cx="495" cy="310" r="18" fill="#fff" stroke="#b91c1c" stroke-width="7"/>
    <circle cx="1118" cy="560" r="18" fill="#fff" stroke="#1d4ed8" stroke-width="7"/>

    <text x="385" y="170" font-size="46" fill="#b91c1c">介入発動</text>
    <line x1="468" y1="205" x2="495" y2="284" stroke="#b91c1c" stroke-width="5" marker-end="url(#arrow-red)"/>
    <text x="1195" y="455" font-size="46" fill="#1d4ed8">介入解除</text>
    <line x1="1180" y1="482" x2="1138" y2="542" stroke="#1d4ed8" stroke-width="5" marker-end="url(#arrow-blue)"/>
    <text x="760" y="450" font-size="54" fill="#1d4ed8" text-anchor="middle">不感帯</text>
  </g>
</svg>
