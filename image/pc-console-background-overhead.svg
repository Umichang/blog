<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Windows PCのバックグラウンド処理とゲームへの影響</title>
  <desc id="desc">ゲーム実行中のPCではOS更新、セキュリティ、クラウド同期、ブラウザ、配信ソフト、周辺機器サービス、ランチャー、オーバーレイなどが並行して動き、フレームタイム、入力遅延、メモリ、I/Oに影響する。</desc>
  <defs>
    <style>
      .bg{fill:#f6f8fb}
      .panel{fill:#fff;stroke:#d7dde8;stroke-width:2}
      .game{fill:#1f6feb}
      .service{fill:#eaf2ff;stroke:#83a8df;stroke-width:2}
      .impact{fill:#fff8e6;stroke:#d6a84f;stroke-width:2}
      .title{font:700 34px system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#1f2937}
      .label{font:700 22px system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#1f2937}
      .small{font:600 18px system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#374151}
      .white{font:700 24px system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#fff}
      .arrow{stroke:#64748b;stroke-width:4;fill:none;marker-end:url(#arrow)}
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#64748b"/>
    </marker>
  </defs>
  <rect class="bg" width="1200" height="720"/>
  <text class="title" x="60" y="68">汎用OSでは、ゲームの横で多くの処理が走る</text>

  <rect class="panel" x="60" y="105" width="1080" height="430" rx="8"/>
  <rect class="game" x="455" y="245" width="290" height="150" rx="8"/>
  <text class="white" x="600" y="305" text-anchor="middle">ゲーム本体</text>
  <text class="white" x="600" y="342" text-anchor="middle">CPU / GPU / メモリ / I/O</text>

  <g>
    <rect class="service" x="105" y="145" width="210" height="70" rx="8"/>
    <text class="small" x="210" y="174" text-anchor="middle">OS更新</text>
    <text class="small" x="210" y="199" text-anchor="middle">セキュリティ</text>
    <path class="arrow" d="M315 180 C390 190 405 240 455 275"/>
  </g>
  <g>
    <rect class="service" x="365" y="145" width="210" height="70" rx="8"/>
    <text class="small" x="470" y="174" text-anchor="middle">クラウド同期</text>
    <text class="small" x="470" y="199" text-anchor="middle">ブラウザ</text>
    <path class="arrow" d="M500 215 C520 235 535 245 555 245"/>
  </g>
  <g>
    <rect class="service" x="625" y="145" width="210" height="70" rx="8"/>
    <text class="small" x="730" y="174" text-anchor="middle">配信・録画</text>
    <text class="small" x="730" y="199" text-anchor="middle">チャット</text>
    <path class="arrow" d="M705 215 C690 235 675 245 655 245"/>
  </g>
  <g>
    <rect class="service" x="885" y="145" width="210" height="70" rx="8"/>
    <text class="small" x="990" y="174" text-anchor="middle">ランチャー</text>
    <text class="small" x="990" y="199" text-anchor="middle">オーバーレイ</text>
    <path class="arrow" d="M885 185 C805 200 780 250 745 280"/>
  </g>
  <g>
    <rect class="service" x="230" y="440" width="250" height="70" rx="8"/>
    <text class="small" x="355" y="469" text-anchor="middle">周辺機器サービス</text>
    <text class="small" x="355" y="494" text-anchor="middle">RGB / ヘッドセット</text>
    <path class="arrow" d="M440 440 C470 420 500 405 535 395"/>
  </g>
  <g>
    <rect class="service" x="720" y="440" width="250" height="70" rx="8"/>
    <text class="small" x="845" y="469" text-anchor="middle">ドライバ補助</text>
    <text class="small" x="845" y="494" text-anchor="middle">入力・音声サービス</text>
    <path class="arrow" d="M765 440 C735 420 700 405 665 395"/>
  </g>

  <rect class="impact" x="90" y="575" width="1020" height="92" rx="8"/>
  <text class="label" x="135" y="622">影響が出やすい場所</text>
  <text class="small" x="365" y="622">フレームタイムの乱れ</text>
  <text class="small" x="590" y="622">入力遅延</text>
  <text class="small" x="725" y="622">メモリ消費</text>
  <text class="small" x="890" y="622">I/O競合</text>
</svg>
