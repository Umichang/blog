<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760" role="img" aria-labelledby="title desc">
  <title id="title">非同期オンライン要素の体験分類マップ</title>
  <desc id="desc">非同期オンライン要素の5分類を、横軸の一方向から双方向、縦軸の帰属感から競争心の上に配置した図。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="10" markerHeight="10" orient="auto">
      <path d="M 1 1 L 11 6 L 1 11 z" fill="#334155"/>
    </marker>
    <filter id="shadow" x="-8%" y="-16%" width="116%" height="136%">
      <feDropShadow dx="0" dy="8" stdDeviation="7" flood-color="#1f2937" flood-opacity="0.14"/>
    </filter>
    <style>
      .bg { fill: #f6f4ee; }
      .plot { fill: #fffdf8; stroke: #d7d1c3; stroke-width: 2; }
      .axis { stroke: #334155; stroke-width: 3; marker-end: url(#arrow); }
      .axis-light { stroke: #d9d4c8; stroke-width: 1.5; stroke-dasharray: 8 10; }
      .title { font: 700 32px -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", "Noto Sans JP", sans-serif; fill: #172033; }
      .subtitle { font: 500 16px -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", "Noto Sans JP", sans-serif; fill: #5d6678; }
      .axis-label { font: 700 19px -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", "Noto Sans JP", sans-serif; fill: #263244; }
      .axis-note { font: 500 14px -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", "Noto Sans JP", sans-serif; fill: #64748b; }
      .card { filter: url(#shadow); }
      .card-bg { fill: #ffffff; stroke-width: 2.5; }
      .card-title { font: 700 21px -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", "Noto Sans JP", sans-serif; fill: #111827; }
      .card-sub { font: 700 15px -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", "Noto Sans JP", sans-serif; fill: #475569; }
      .card-body { font: 500 14px -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", "Noto Sans JP", sans-serif; fill: #596579; }
      .one { stroke: #287f71; }
      .two { stroke: #4d6fb3; }
      .three { stroke: #b36b2c; }
      .four { stroke: #9d4d75; }
      .five { stroke: #8a5fbd; }
      .badge { font: 700 16px -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", "Noto Sans JP", sans-serif; fill: #ffffff; }
    </style>
  </defs>

  <rect class="bg" width="1280" height="760"/>
  <text class="title" x="70" y="64">非同期オンライン要素の体験分類マップ</text>
  <text class="subtitle" x="70" y="94">左ほど「受け取る」体験、右ほど「与えあう」体験。上は帰属感、下は競争心・緊張感へ寄る。</text>

  <rect class="plot" x="82" y="132" width="1116" height="540" rx="14"/>
  <line class="axis-light" x1="640" y1="150" x2="640" y2="646"/>
  <line class="axis-light" x1="110" y1="402" x2="1170" y2="402"/>
  <line class="axis" x1="136" y1="402" x2="1148" y2="402"/>
  <line class="axis" x1="640" y1="632" x2="640" y2="170"/>

  <text class="axis-label" x="150" y="382" text-anchor="start">一方向</text>
  <text class="axis-note" x="150" y="426" text-anchor="start">受け取る</text>
  <text class="axis-label" x="1130" y="382" text-anchor="end">双方向</text>
  <text class="axis-note" x="1130" y="426" text-anchor="end">与えあう</text>
  <text class="axis-label" x="660" y="182">孤独感の緩和・帰属感</text>
  <text class="axis-label" x="660" y="632">競争心・達成感・緊張感</text>

  <g class="card" transform="translate(170 190)">
    <rect class="card-bg one" width="300" height="130" rx="10"/>
    <circle cx="32" cy="34" r="18" fill="#287f71"/>
    <text class="badge" x="32" y="40" text-anchor="middle">1</text>
    <text class="card-title" x="62" y="40">痕跡と気配</text>
    <text class="card-sub" x="28" y="72">受動的な共存</text>
    <text class="card-body" x="28" y="100">血痕・幻影・足跡が</text>
    <text class="card-body" x="28" y="120">孤独な世界に人の息吹を足す</text>
  </g>

  <g class="card" transform="translate(810 190)">
    <rect class="card-bg three" width="300" height="130" rx="10"/>
    <circle cx="32" cy="34" r="18" fill="#b36b2c"/>
    <text class="badge" x="32" y="40" text-anchor="middle">3</text>
    <text class="card-title" x="62" y="40">インフラ共同構築</text>
    <text class="card-sub" x="28" y="72">能動的な貢献</text>
    <text class="card-body" x="28" y="100">構造物・資材・いいねで</text>
    <text class="card-body" x="28" y="120">見知らぬ誰かの道を作る</text>
  </g>

  <g class="card" transform="translate(170 450)">
    <rect class="card-bg two" width="300" height="130" rx="10"/>
    <circle cx="32" cy="34" r="18" fill="#4d6fb3"/>
    <text class="badge" x="32" y="40" text-anchor="middle">2</text>
    <text class="card-title" x="62" y="40">知恵の継承</text>
    <text class="card-sub" x="28" y="72">情報の授受</text>
    <text class="card-body" x="28" y="100">メッセージやサインが</text>
    <text class="card-body" x="28" y="120">ヒントにも罠にもなる</text>
  </g>

  <g class="card" transform="translate(810 450)">
    <rect class="card-bg five" width="300" height="130" rx="10"/>
    <circle cx="32" cy="34" r="18" fill="#8a5fbd"/>
    <text class="badge" x="32" y="40" text-anchor="middle">5</text>
    <text class="card-title" x="62" y="40">非対称の攻防</text>
    <text class="card-sub" x="28" y="72">戦略の衝突</text>
    <text class="card-body" x="28" y="100">オフライン防衛やヘイターが</text>
    <text class="card-body" x="28" y="120">不在中の緊張を生む</text>
  </g>

  <g class="card" transform="translate(490 560)">
    <rect class="card-bg four" width="300" height="120" rx="10"/>
    <circle cx="32" cy="34" r="18" fill="#9d4d75"/>
    <text class="badge" x="32" y="40" text-anchor="middle">4</text>
    <text class="card-title" x="62" y="40">共通体験と競争</text>
    <text class="card-sub" x="28" y="72">同じ条件で比較する</text>
    <text class="card-body" x="28" y="100">デイリー・ゴースト・日替わり問題</text>
  </g>

  <text class="axis-note" x="92" y="716">※ 分類は排他的ではなく、ひとつの機能が複数の体験を兼ねることがある。</text>
</svg>
