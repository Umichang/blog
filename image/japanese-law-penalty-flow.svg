<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760" role="img" aria-labelledby="title desc">
  <title id="title">表示規制違反の罰則フロー</title>
  <desc id="desc">景品表示法の表示規制違反について、違反行為の認定から措置命令、課徴金、繰り返し違反時の加算、刑事罰、法人罰へ進む流れを示す図。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="10" markerHeight="10" orient="auto">
      <path d="M 1 1 L 11 6 L 1 11 z" fill="#334155"/>
    </marker>
    <filter id="shadow" x="-8%" y="-18%" width="116%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="7" flood-color="#1d2636" flood-opacity="0.13"/>
    </filter>
    <style>
      .bg { fill: #f7f5ef; }
      .title { font: 700 34px -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", "Noto Sans JP", sans-serif; fill: #172033; }
      .subtitle { font: 500 17px -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", "Noto Sans JP", sans-serif; fill: #5d6678; }
      .step { filter: url(#shadow); }
      .step-rect { fill: #ffffff; stroke: #d8d1c2; stroke-width: 2; }
      .step-key { fill: #fff7e0; stroke: #d49a2f; stroke-width: 2.5; }
      .step-warn { fill: #fff1f1; stroke: #c65d5d; stroke-width: 2.5; }
      .num { font: 700 17px -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", "Noto Sans JP", sans-serif; fill: #ffffff; }
      .step-title { font: 700 22px -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", "Noto Sans JP", sans-serif; fill: #172033; }
      .step-note { font: 500 15px -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", "Noto Sans JP", sans-serif; fill: #5f6b7a; }
      .flow { fill: none; stroke: #334155; stroke-width: 3.5; stroke-linecap: round; marker-end: url(#arrow); }
      .condition { fill: #edf2f7; stroke: #cbd5e1; stroke-width: 1.5; }
      .condition-text { font: 700 14px -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", "Noto Sans JP", sans-serif; fill: #334155; }
      .side { fill: #fffdf8; stroke: #d8d1c2; stroke-width: 2; }
      .side-title { font: 700 18px -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", "Noto Sans JP", sans-serif; fill: #7f1d1d; }
      .side-body { font: 500 14px -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", "Noto Sans JP", sans-serif; fill: #5f6b7a; }
    </style>
  </defs>

  <rect class="bg" width="1280" height="760"/>
  <text class="title" x="64" y="64">表示規制違反の罰則フロー</text>
  <text class="subtitle" x="64" y="96">措置命令を起点に、売上規模・繰り返し違反・命令違反の条件で行政上／刑事上のリスクが重なる。</text>

  <g class="step" transform="translate(82 160)">
    <rect class="step-rect" width="310" height="96" rx="10"/>
    <circle cx="36" cy="48" r="20" fill="#287f71"/>
    <text class="num" x="36" y="54" text-anchor="middle">1</text>
    <text class="step-title" x="72" y="42">違反行為の認定</text>
    <text class="step-note" x="72" y="68">優良誤認・有利誤認など</text>
  </g>

  <path class="flow" d="M 406 208 H 510"/>

  <g class="step" transform="translate(520 160)">
    <rect class="step-key" width="310" height="96" rx="10"/>
    <circle cx="36" cy="48" r="20" fill="#d49a2f"/>
    <text class="num" x="36" y="54" text-anchor="middle">2</text>
    <text class="step-title" x="72" y="42">措置命令</text>
    <text class="step-note" x="72" y="68">差止・再発防止・周知</text>
  </g>

  <path class="flow" d="M 675 264 V 337"/>
  <rect class="condition" x="506" y="282" width="338" height="36" rx="18"/>
  <text class="condition-text" x="675" y="305" text-anchor="middle">売上5,000万円以上などの要件</text>

  <g class="step" transform="translate(520 348)">
    <rect class="step-rect" width="310" height="96" rx="10"/>
    <circle cx="36" cy="48" r="20" fill="#4d6fb3"/>
    <text class="num" x="36" y="54" text-anchor="middle">3</text>
    <text class="step-title" x="72" y="42">課徴金納付命令</text>
    <text class="step-note" x="72" y="68">売上高の3%、最大3年分</text>
  </g>

  <path class="flow" d="M 675 452 V 525"/>
  <rect class="condition" x="490" y="470" width="370" height="36" rx="18"/>
  <text class="condition-text" x="675" y="493" text-anchor="middle">10年以内に課徴金命令を受けて再違反</text>

  <g class="step" transform="translate(520 536)">
    <rect class="step-key" width="310" height="96" rx="10"/>
    <circle cx="36" cy="48" r="20" fill="#b36b2c"/>
    <text class="num" x="36" y="54" text-anchor="middle">4</text>
    <text class="step-title" x="72" y="42">課徴金1.5倍加算</text>
    <text class="step-note" x="72" y="68">算定率4.5%へ上昇</text>
  </g>

  <path class="flow" d="M 840 208 H 942"/>
  <rect class="condition" x="860" y="160" width="250" height="36" rx="18"/>
  <text class="condition-text" x="985" y="183" text-anchor="middle">措置命令違反</text>

  <g class="step" transform="translate(952 220)">
    <rect class="step-warn" width="260" height="96" rx="10"/>
    <circle cx="36" cy="48" r="20" fill="#b83232"/>
    <text class="num" x="36" y="54" text-anchor="middle">5</text>
    <text class="step-title" x="72" y="42">刑事罰</text>
    <text class="step-note" x="72" y="68">2年以下の懲役</text>
    <text class="step-note" x="72" y="88">または300万円以下の罰金</text>
  </g>

  <path class="flow" d="M 1082 324 V 401"/>
  <rect class="condition" x="966" y="342" width="232" height="36" rx="18"/>
  <text class="condition-text" x="1082" y="365" text-anchor="middle">法人の場合</text>

  <g class="step" transform="translate(952 412)">
    <rect class="step-warn" width="260" height="96" rx="10"/>
    <circle cx="36" cy="48" r="20" fill="#7f1d1d"/>
    <text class="num" x="36" y="54" text-anchor="middle">6</text>
    <text class="step-title" x="72" y="42">法人罰</text>
    <text class="step-note" x="72" y="70">3億円以下の罰金</text>
  </g>

  <rect class="side" x="82" y="536" width="310" height="96" rx="10"/>
  <text class="side-title" x="112" y="574">設計段階の示唆</text>
  <text class="side-body" x="112" y="602">排出率・性能表示・価格訴求は</text>
  <text class="side-body" x="112" y="624">実装と広告表現の突き合わせが前提。</text>

  <text class="subtitle" x="64" y="704">※ 課徴金や刑事罰の適用可否は事案ごとの要件判断を要する。本文はプランナー向けのリスク把握用に簡略化している。</text>
</svg>
