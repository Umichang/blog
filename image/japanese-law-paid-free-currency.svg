<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760" role="img" aria-labelledby="title desc">
  <title id="title">有償・無償コインの二層管理パターン</title>
  <desc id="desc">課金で購入する有償コインと、ゲームプレイで獲得する無償コインを別管理し、ガチャやアイテム購入時の消費順とサービス終了時の返金対象を整理した図。</desc>
  <defs>
    <marker id="arrow-blue" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="10" markerHeight="10" orient="auto">
      <path d="M 1 1 L 11 6 L 1 11 z" fill="#3457a6"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="10" markerHeight="10" orient="auto">
      <path d="M 1 1 L 11 6 L 1 11 z" fill="#287f71"/>
    </marker>
    <marker id="arrow-muted" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="10" markerHeight="10" orient="auto">
      <path d="M 1 1 L 11 6 L 1 11 z" fill="#94a3b8"/>
    </marker>
    <filter id="shadow" x="-8%" y="-18%" width="116%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="7" flood-color="#1d2636" flood-opacity="0.13"/>
    </filter>
    <style>
      .bg { fill: #f7f5ef; }
      .title { font: 700 34px -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", "Noto Sans JP", sans-serif; fill: #172033; }
      .subtitle { font: 500 17px -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", "Noto Sans JP", sans-serif; fill: #5d6678; }
      .card { filter: url(#shadow); }
      .paid { fill: #fff7e0; stroke: #d49a2f; stroke-width: 2.5; }
      .free { fill: #eaf7f0; stroke: #287f71; stroke-width: 2.5; }
      .neutral { fill: #ffffff; stroke: #d8d1c2; stroke-width: 2; }
      .decision { fill: #eef2ff; stroke: #4d6fb3; stroke-width: 2.5; }
      .refund { fill: #fff1f1; stroke: #c65d5d; stroke-width: 2.5; }
      .label { font: 700 22px -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", "Noto Sans JP", sans-serif; fill: #172033; }
      .body { font: 500 15px -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", "Noto Sans JP", sans-serif; fill: #5f6b7a; }
      .badge { font: 700 14px -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", "Noto Sans JP", sans-serif; fill: #ffffff; }
      .section { font: 700 15px -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", "Noto Sans JP", sans-serif; fill: #6a5f4e; }
      .flow-paid { fill: none; stroke: #3457a6; stroke-width: 4; stroke-linecap: round; marker-end: url(#arrow-blue); }
      .flow-free { fill: none; stroke: #287f71; stroke-width: 4; stroke-linecap: round; marker-end: url(#arrow-green); }
      .flow-muted { fill: none; stroke: #94a3b8; stroke-width: 3; stroke-linecap: round; stroke-dasharray: 7 8; marker-end: url(#arrow-muted); }
      .note { fill: #fffdf8; stroke: #d8d1c2; stroke-width: 2; }
      .note-title { font: 700 18px -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", "Noto Sans JP", sans-serif; fill: #7a4b12; }
      .note-body { font: 500 14px -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", "Noto Sans JP", sans-serif; fill: #5f6b7a; }
    </style>
  </defs>

  <rect class="bg" width="1280" height="760"/>
  <text class="title" x="64" y="64">有償・無償コインの二層管理パターン</text>
  <text class="subtitle" x="64" y="96">入手経路で残高を分け、購入時の消費順とサービス終了時の返金対象を明確にする。</text>

  <rect x="76" y="136" width="1128" height="498" rx="16" fill="#fffdf8" stroke="#d8d1c2" stroke-width="2"/>
  <text class="section" x="116" y="174">入手</text>
  <text class="section" x="462" y="174">残高管理</text>
  <text class="section" x="792" y="174">消費設計</text>
  <text class="section" x="1030" y="174">終了時</text>

  <g class="card" transform="translate(116 220)">
    <rect class="paid" width="250" height="118" rx="10"/>
    <rect x="24" y="22" width="72" height="26" rx="13" fill="#d49a2f"/>
    <text class="badge" x="60" y="40" text-anchor="middle">課金</text>
    <text class="label" x="24" y="76">有償コイン</text>
    <text class="body" x="24" y="100">購入単価・発行日を記録</text>
  </g>

  <g class="card" transform="translate(116 430)">
    <rect class="free" width="250" height="118" rx="10"/>
    <rect x="24" y="22" width="96" height="26" rx="13" fill="#287f71"/>
    <text class="badge" x="72" y="40" text-anchor="middle">プレイ報酬</text>
    <text class="label" x="24" y="76">無償コイン</text>
    <text class="body" x="24" y="100">ログイン・イベント配布</text>
  </g>

  <path class="flow-paid" d="M 378 279 H 472"/>
  <path class="flow-free" d="M 378 489 H 472"/>

  <g class="card" transform="translate(486 194)">
    <rect class="neutral" width="240" height="390" rx="12"/>
    <text class="label" x="120" y="46" text-anchor="middle">別管理台帳</text>
    <line x1="30" y1="76" x2="210" y2="76" stroke="#e2dccf" stroke-width="2"/>
    <rect x="34" y="108" width="172" height="92" rx="8" fill="#fff7e0" stroke="#d49a2f" stroke-width="2"/>
    <text class="label" x="120" y="144" text-anchor="middle">有償残高</text>
    <text class="body" x="120" y="172" text-anchor="middle">返金計算の対象</text>
    <rect x="34" y="236" width="172" height="92" rx="8" fill="#eaf7f0" stroke="#287f71" stroke-width="2"/>
    <text class="label" x="120" y="272" text-anchor="middle">無償残高</text>
    <text class="body" x="120" y="300" text-anchor="middle">原則返金対象外</text>
    <text class="body" x="120" y="356" text-anchor="middle">同じ「石」に見えても</text>
    <text class="body" x="120" y="380" text-anchor="middle">法務・会計上は分ける</text>
  </g>

  <path class="flow-paid" d="M 738 322 C 790 322 790 276 830 276"/>
  <path class="flow-free" d="M 738 456 C 790 456 790 420 830 420"/>

  <g class="card" transform="translate(838 238)">
    <rect class="decision" width="224" height="220" rx="12"/>
    <text class="label" x="112" y="44" text-anchor="middle">購入・ガチャ</text>
    <text class="body" x="112" y="76" text-anchor="middle">どちらを先に消費するかを</text>
    <text class="body" x="112" y="100" text-anchor="middle">仕様として明示</text>
    <rect x="34" y="126" width="156" height="38" rx="19" fill="#4d6fb3"/>
    <text class="badge" x="112" y="151" text-anchor="middle">有償優先 / 無償優先</text>
    <text class="body" x="112" y="190" text-anchor="middle">残高表示・利用規約とも</text>
    <text class="body" x="112" y="212" text-anchor="middle">整合させる</text>
  </g>

  <path class="flow-paid" d="M 1068 292 C 1112 292 1112 250 1144 250"/>
  <path class="flow-muted" d="M 1068 408 C 1112 408 1112 520 1144 520"/>

  <g class="card" transform="translate(940 520)">
    <rect class="refund" width="220" height="86" rx="10"/>
    <text class="label" x="110" y="36" text-anchor="middle">返金義務</text>
    <text class="body" x="110" y="62" text-anchor="middle">未使用の有償分を算定</text>
  </g>

  <g class="card" transform="translate(940 160)">
    <rect class="neutral" width="220" height="86" rx="10"/>
    <text class="label" x="110" y="36" text-anchor="middle">サービス提供</text>
    <text class="body" x="110" y="62" text-anchor="middle">ガチャ・アイテム購入</text>
  </g>

  <rect class="note" x="116" y="660" width="1048" height="58" rx="10"/>
  <text class="note-title" x="146" y="696">設計上の焦点</text>
  <text class="note-body" x="274" y="696">割引販売・有効期限・消費順は、返金額とユーザー説明に直結するため、仕様書段階で法務レビューに回す。</text>
</svg>
